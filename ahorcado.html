<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🪢 Ahorcado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg:#07070f; --bg2:#0d0d1a; --line:rgba(255,255,255,0.09); --line-hi:rgba(255,255,255,0.18); --txt:#f4f4fb; --mut:#8a8aa3; --mut2:#5b5b72; --gold:#ffcb52; --green:#2ee6a0; --red:#ff5e6c; --key:#2c2c40; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: radial-gradient(900px 560px at 50% -12%, #14142a 0%, rgba(20,20,42,0) 60%), var(--bg); color: var(--txt); font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; overflow: hidden; -webkit-font-smoothing: antialiased; user-select: none; }
  ::selection { background: var(--gold); color: #07070f; }
  #menuLink { position: absolute; top: 14px; left: 14px; z-index: 6; padding: 8px 16px; border-radius: 999px; background: rgba(255,255,255,0.07); border: 1px solid var(--line); color: var(--txt); font-size: 13px; font-weight: 600; text-decoration: none; transition: background .15s, border-color .15s; }
  #menuLink:hover { background: rgba(255,255,255,0.14); border-color: var(--line-hi); }
  #helpBtn { position: absolute; top: 14px; right: 14px; z-index: 6; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.07); border: 1px solid var(--line); color: var(--mut); font-size: 16px; font-weight: 700; cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
  #helpBtn:hover { background: rgba(255,255,255,0.14); color: var(--txt); border-color: var(--line-hi); }
  #app { width: min(94vw, 460px); height: 100dvh; display: flex; flex-direction: column; padding: 14px 14px calc(14px + env(safe-area-inset-bottom)); gap: 10px; }
  header { text-align: center; margin-top: 38px; flex: none; }
  header h1 { font-size: clamp(24px, 6.5vw, 32px); font-weight: 700; letter-spacing: -0.02em; text-transform: uppercase; }
  header h1 .o { color: var(--gold); }
  .top { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px; flex: none; }
  .cat { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--mut); }
  .cat b { color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; }
  .lives { display: flex; gap: 4px; }
  .heart { font-size: 16px; transition: opacity .2s, transform .2s; }
  .heart.lost { opacity: 0.22; transform: scale(0.8); }
  /* gallows */
  #stage { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  svg.gallows { width: auto; height: 100%; max-height: min(34vh, 240px); }
  .gl { stroke: var(--mut2); stroke-width: 6; stroke-linecap: round; fill: none; }
  .man { stroke: var(--red); stroke-width: 6; stroke-linecap: round; fill: none; opacity: 0; transition: opacity .3s; }
  .man.show { opacity: 1; }
  /* word */
  #word { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; flex: none; padding: 4px 0 6px; }
  .slot { width: clamp(26px, 8vw, 38px); height: clamp(34px, 10vw, 48px); border-bottom: 3px solid var(--line-hi); display: flex; align-items: center; justify-content: center; font-size: clamp(20px, 6vw, 28px); font-weight: 700; text-transform: uppercase; }
  .slot.filled { border-color: var(--green); }
  .slot.miss { border-color: var(--red); color: var(--red); }
  #msg { min-height: 22px; text-align: center; font-size: 15px; font-weight: 600; flex: none; }
  #msg.win { color: var(--green); } #msg.lose { color: var(--red); }
  /* keyboard */
  #kb { display: flex; flex-direction: column; gap: 6px; flex: none; padding-bottom: 2px; }
  .krow { display: flex; gap: 5px; justify-content: center; }
  .key { flex: 1; min-width: 0; height: 46px; display: flex; align-items: center; justify-content: center; background: var(--key); border: none; border-radius: 7px; color: var(--txt); font-family: inherit; font-size: 15px; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: background .12s, transform .08s, color .12s; }
  .key:active { transform: scale(0.92); }
  .key.good { background: var(--green); color: #07070f; }
  .key.bad { background: #18182a; color: var(--mut2); }
  #againBtn { display: none; padding: 12px; border: none; border-radius: 999px; background: var(--gold); color: #07070f; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; flex: none; }
  #help { position: absolute; inset: 0; z-index: 12; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(7,7,15,0.9); backdrop-filter: blur(6px); }
  #help .panel { width: min(94vw, 380px); background: var(--bg2); border: 1px solid var(--line-hi); border-radius: 18px; padding: 24px 22px; }
  #help h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; } #help h2 .o { color: var(--gold); }
  #help ol { padding-left: 18px; } #help li { font-size: 14px; color: var(--mut); line-height: 1.55; margin-bottom: 9px; } #help li b { color: var(--txt); font-weight: 600; }
  #help button { width: 100%; margin-top: 12px; padding: 13px; border: none; border-radius: 999px; background: var(--gold); color: #07070f; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<a id="menuLink" href="index.html">← menú</a>
<button id="helpBtn" aria-label="Cómo se juega">?</button>

<div id="app">
  <header><h1>Ahorc<span class="o">a</span>do</h1></header>
  <div class="top">
    <div class="cat">categoría · <b id="cat">—</b></div>
    <div class="lives" id="lives"></div>
  </div>
  <div id="stage">
    <svg class="gallows" viewBox="0 0 200 240">
      <line class="gl" x1="20" y1="230" x2="110" y2="230"/>
      <line class="gl" x1="50" y1="230" x2="50" y2="20"/>
      <line class="gl" x1="50" y1="20" x2="140" y2="20"/>
      <line class="gl" x1="140" y1="20" x2="140" y2="50"/>
      <circle class="man" id="p0" cx="140" cy="68" r="18"/>
      <line class="man" id="p1" x1="140" y1="86" x2="140" y2="150"/>
      <line class="man" id="p2" x1="140" y1="100" x2="112" y2="125"/>
      <line class="man" id="p3" x1="140" y1="100" x2="168" y2="125"/>
      <line class="man" id="p4" x1="140" y1="150" x2="116" y2="185"/>
      <line class="man" id="p5" x1="140" y1="150" x2="164" y2="185"/>
    </svg>
  </div>
  <div id="word"></div>
  <div id="msg"></div>
  <button id="againBtn">otra palabra</button>
  <div id="kb"></div>
</div>

<div id="help">
  <div class="panel">
    <h2>Cómo se juega <span class="o">·</span> Ahorc<span class="o">a</span>do</h2>
    <ol>
      <li>Adiviná la <b>palabra oculta</b> eligiendo letras del teclado.</li>
      <li>Cada <b>letra errada</b> dibuja una parte del muñeco. Tenés <b>6 fallos</b>.</li>
      <li>Completá la palabra antes de que se dibuje entero. La <b>categoría</b> es tu pista.</li>
    </ol>
    <button id="helpClose">¡a jugar!</button>
  </div>
</div>

<script>
  const BANK = [
    { cat:'animales', words:['ELEFANTE','JIRAFA','COCODRILO','MARIPOSA','PINGUINO','CABALLO','TIBURON','ARDILLA','MURCIELAGO','TORTUGA','CANGURO','DELFIN'] },
    { cat:'frutas', words:['MANZANA','SANDIA','FRUTILLA','DURAZNO','CIRUELA','NARANJA','BANANA','CEREZA','MELON','LIMON'] },
    { cat:'países', words:['ARGENTINA','URUGUAY','BRASIL','CANADA','JAPON','ESPANA','MEXICO','FRANCIA','ITALIA','PORTUGAL'] },
    { cat:'deportes', words:['FUTBOL','TENIS','NATACION','BOXEO','VOLEY','CICLISMO','HOCKEY','BASQUET','RUGBY','ESGRIMA'] },
    { cat:'profesiones', words:['MEDICO','INGENIERO','MAESTRA','BOMBERO','PILOTO','COCINERO','ABOGADO','PINTOR','ENFERMERA','CARPINTERO'] },
  ];
  const MAX = 6;
  const wordEl = document.getElementById('word');
  const kbEl = document.getElementById('kb');
  const msgEl = document.getElementById('msg');
  const livesEl = document.getElementById('lives');
  const catEl = document.getElementById('cat');
  const againBtn = document.getElementById('againBtn');
  let answer, guessed, wrong, over;

  let actx;
  function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state==='suspended') actx.resume(); }
  function tone(f,d,t='sine',v=0.05){ if(!actx)return; const o=actx.createOscillator(),g=actx.createGain(); o.type=t;o.frequency.value=f; const t0=actx.currentTime; g.gain.setValueAtTime(v,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+d); o.connect(g);g.connect(actx.destination);o.start(t0);o.stop(t0+d); }
  const sfxGood = () => tone(560,0.08,'triangle',0.04);
  const sfxBad = () => tone(150,0.16,'sawtooth',0.05);
  const sfxWin = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'square',0.06),i*100));
  const sfxLose = () => [330,247,165].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sawtooth',0.05),i*140));

  const KB_ROWS = ['QWERTYUIOP','ASDFGHJKLÑ','ZXCVBNM'];
  function buildKb() {
    kbEl.innerHTML='';
    for (const r of KB_ROWS) {
      const row=document.createElement('div'); row.className='krow';
      for (const ch of r) { const k=document.createElement('button'); k.className='key'; k.textContent=ch; k.dataset.k=ch; k.addEventListener('click',()=>{ initAudio(); guess(ch); }); row.appendChild(k); }
      kbEl.appendChild(row);
    }
  }
  function keyEl(ch){ return kbEl.querySelector(`.key[data-k="${ch}"]`); }

  function newGame() {
    const set = BANK[Math.floor(Math.random()*BANK.length)];
    answer = set.words[Math.floor(Math.random()*set.words.length)];
    catEl.textContent = set.cat;
    guessed = new Set(); wrong = 0; over = false;
    msgEl.textContent=''; msgEl.className=''; againBtn.style.display='none';
    document.querySelectorAll('.man').forEach(m=>m.classList.remove('show'));
    buildKb();
    renderWord();
    renderLives();
  }
  function renderLives() {
    livesEl.innerHTML='';
    for (let i=0;i<MAX;i++){ const h=document.createElement('span'); h.className='heart'+(i<wrong?' lost':''); h.textContent='❤'; livesEl.appendChild(h); }
  }
  function renderWord() {
    wordEl.innerHTML='';
    for (const ch of answer) {
      const s=document.createElement('div'); s.className='slot';
      if (guessed.has(ch)) { s.textContent=ch; s.classList.add('filled'); }
      else if (over) { s.textContent=ch; s.classList.add('miss'); }
      wordEl.appendChild(s);
    }
  }

  function guess(ch) {
    if (over || guessed.has(ch)) return;
    guessed.add(ch);
    const k = keyEl(ch);
    if (answer.includes(ch)) {
      if (k) k.classList.add('good'); sfxGood(); renderWord();
      if ([...answer].every(c=>guessed.has(c))) finish(true);
    } else {
      if (k) k.classList.add('bad');
      wrong++; sfxBad(); renderLives();
      const part = document.getElementById('p'+(wrong-1)); if (part) part.classList.add('show');
      if (wrong>=MAX) finish(false);
    }
  }

  function finish(win) {
    over = true;
    renderWord();
    if (win) { msgEl.textContent='🎉 ¡Adivinaste!'; msgEl.className='win'; sfxWin();
      const w = (parseInt(localStorage.getItem('ahorcadoWins')||'0',10)||0) + 1;
      localStorage.setItem('ahorcadoWins', String(w));
    }
    else { msgEl.textContent='Perdiste — era '+answer; msgEl.className='lose'; sfxLose(); }
    againBtn.style.display='block';
  }

  document.addEventListener('keydown', e=>{
    initAudio();
    if (over && e.key==='Enter') { newGame(); return; }
    let k=e.key.toUpperCase();
    if (k==='Ñ' || /^[A-Z]$/.test(k)) guess(k);
  });
  againBtn.addEventListener('click', ()=>{ initAudio(); newGame(); });
  const helpEl = document.getElementById('help');
  document.getElementById('helpBtn').addEventListener('click', ()=>helpEl.style.display='flex');
  document.getElementById('helpClose').addEventListener('click', ()=>{ helpEl.style.display='none'; localStorage.setItem('ahorcadoSeenHelp','1'); });
  helpEl.addEventListener('click', e=>{ if(e.target===helpEl) helpEl.style.display='none'; });
  if (!localStorage.getItem('ahorcadoSeenHelp')) helpEl.style.display='flex';
  document.addEventListener('gesturestart', e=>e.preventDefault());
  newGame();
</script>
</body>
</html>
