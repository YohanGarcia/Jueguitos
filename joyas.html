<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>💎 joyas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0c0a18; display: flex; justify-content: center; align-items: center; height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
  }
  canvas {
    border-radius: 16px; box-shadow: 0 0 60px rgba(192, 132, 252, 0.18);
    width: auto; height: auto; aspect-ratio: 520 / 760; max-width: calc(100vw - 32px); max-height: calc(100dvh - 32px); touch-action: none;
  }
  .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 3; pointer-events: none; width: 100%; padding: 0 24px; }
  #startScreen .em { font-size: 60px; display: block; margin-bottom: 6px; }
  #startScreen h1 { font-size: 48px; letter-spacing: 3px; margin-bottom: 12px; }
  #startScreen p { font-size: 15px; opacity: 0.6; line-height: 1.7; }
  #startScreen .go { margin-top: 18px; font-size: 15px; color: #c084fc; font-weight: 700; animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }
  #menuLink {
    position: absolute; top: 16px; left: 16px; padding: 8px 18px; border: none; border-radius: 30px;
    background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; z-index: 5; text-decoration: none; transition: background 0.15s;
  }
  #menuLink:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="startScreen" class="overlay">
  <span class="em">💎</span>
  <h1>JOYAS</h1>
  <p>Intercambiá gemas vecinas para alinear 3 o más.<br>Encadená combos. 4 en línea = rayo, 5 = bomba.</p>
  <div class="go">► tocá para empezar</div>
</div>

<a id="menuLink" href="index.html">← menú</a>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('startScreen');

  const W = 520, H = 760;
  canvas.width = W; canvas.height = H;

  const COLS = 8, ROWS = 9, CELL = 56;
  const BX = (W - COLS * CELL) / 2, BY = 120;
  const RAD = 22;

  const COLORS = ['#ff5d6c', '#ff9f43', '#ffd23e', '#4ade80', '#38bdf8', '#c084fc'];
  const NC = COLORS.length;

  let grid, particles, texts;
  let state = 'start';
  let phase = 'idle';     // idle | swapAnim | revertAnim | clearAnim | fallAnim
  let score, best, combo, frame, shake;
  let sel = null, pending = null, pendingClear = null, pendingSpecials = null;

  // ---------- audio ----------
  let actx;
  function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
  function tone(f, d, t = 'square', v = 0.04, slideTo = null) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, actx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + d);
    g.gain.setValueAtTime(v, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + d);
  }
  const sfxSwap = () => tone(500, 0.07, 'sine', 0.04, 720);
  const sfxBad = () => tone(220, 0.12, 'square', 0.04, 150);
  const sfxClear = (n) => tone(420 + n * 70, 0.09, 'square', 0.035, 720 + n * 80);
  const sfxSpecial = () => tone(300, 0.2, 'sawtooth', 0.05, 1400);
  const sfxDrop = () => tone(300, 0.05, 'sine', 0.02, 200);

  function rand(a, b) { return Math.random() * (b - a) + a; }
  function key(r, c) { return r + ',' + c; }
  function cellPos(r, c) { return { x: BX + c * CELL + CELL / 2, y: BY + r * CELL + CELL / 2 }; }
  function makeGem(color) { return { color, special: null, px: 0, py: 0, tx: 0, ty: 0, scale: 1, dying: false, _trig: false }; }
  function setTarget(r, c, g) { const p = cellPos(r, c); g.tx = p.x; g.ty = p.y; }

  function inBoard(x, y) { return x >= BX && x < BX + COLS * CELL && y >= BY && y < BY + ROWS * CELL; }
  function cellAt(x, y) { if (!inBoard(x, y)) return null; return { r: Math.floor((y - BY) / CELL), c: Math.floor((x - BX) / CELL) }; }
  function adjacent(a, b) { return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1; }

  function newBoard() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        let col;
        do { col = Math.floor(rand(0, NC)); }
        while ((c >= 2 && grid[r][c-1].color === col && grid[r][c-2].color === col) ||
               (r >= 2 && grid[r-1][c].color === col && grid[r-2][c].color === col));
        const g = makeGem(col); const p = cellPos(r, c); g.px = p.x; g.py = p.y; setTarget(r, c, g);
        grid[r][c] = g;
      }
    }
  }

  function reset() {
    initAudio();
    newBoard(); particles = []; texts = [];
    score = 0; combo = 0; frame = 0; shake = 0; sel = null; phase = 'idle';
    best = parseInt(localStorage.getItem('joyasBest') || '0', 10);
    startScreen.style.display = 'none';
    state = 'play';
  }

  function burst(x, y, color, n) { for (let i = 0; i < n; i++) { const a = rand(0, Math.PI * 2), sp = rand(1, 5); particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, decay: rand(0.03, 0.06), size: rand(2, 5), color }); } }
  function showText(x, y, msg, color) { texts.push({ x, y, msg, color, life: 1, vy: -0.8 }); }

  // ---------- match logic ----------
  function findMatchData() {
    const clear = new Set(); const runsBig = [];
    for (let r = 0; r < ROWS; r++) { let c = 0; while (c < COLS) { const g = grid[r][c]; if (!g) { c++; continue; } let c2 = c + 1; while (c2 < COLS && grid[r][c2] && grid[r][c2].color === g.color) c2++; const len = c2 - c; if (len >= 3) { const cells = []; for (let k = c; k < c2; k++) { clear.add(key(r, k)); cells.push([r, k]); } if (len >= 4) runsBig.push({ cells, len }); } c = c2; } }
    for (let c = 0; c < COLS; c++) { let r = 0; while (r < ROWS) { const g = grid[r][c]; if (!g) { r++; continue; } let r2 = r + 1; while (r2 < ROWS && grid[r2][c] && grid[r2][c].color === g.color) r2++; const len = r2 - r; if (len >= 3) { const cells = []; for (let k = r; k < r2; k++) { clear.add(key(k, c)); cells.push([k, c]); } if (len >= 4) runsBig.push({ cells, len }); } r = r2; } }
    return { clear, runsBig };
  }

  function lineArea(r, c) { const a = []; for (let i = 0; i < COLS; i++) a.push(key(r, i)); for (let i = 0; i < ROWS; i++) a.push(key(i, c)); return a; }
  function bombArea(r, c) { const a = []; for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) { const nr = r + dr, nc = c + dc; if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) a.push(key(nr, nc)); } return a; }

  function beginResolve(swapCells) {
    const { clear, runsBig } = findMatchData();
    if (clear.size === 0) return false;

    // plan new specials from big runs
    const specials = new Map();
    for (const run of runsBig) {
      let pick = null;
      if (swapCells) for (const s of swapCells) if (run.cells.some(([r, c]) => r === s.r && c === s.c)) { pick = [s.r, s.c]; break; }
      if (!pick) pick = run.cells[Math.floor(run.len / 2)];
      const k = key(pick[0], pick[1]); const kind = run.len >= 5 ? 'bomb' : 'line';
      const cur = specials.get(k);
      if (!cur || (cur === 'line' && kind === 'bomb')) specials.set(k, kind);
    }

    // trigger existing specials inside the clear set (chain)
    const finalClear = new Set(clear);
    const stack = [...finalClear];
    while (stack.length) {
      const k = stack.pop(); const [r, c] = k.split(',').map(Number); const g = grid[r][c];
      if (g && g.special && !specials.has(k) && !g._trig) {
        g._trig = true;
        const area = g.special === 'bomb' ? bombArea(r, c) : lineArea(r, c);
        for (const ak of area) if (!finalClear.has(ak)) { finalClear.add(ak); stack.push(ak); }
        sfxSpecial();
      }
    }
    // cells becoming new specials are not cleared
    for (const k of specials.keys()) finalClear.delete(k);

    combo++;
    const mult = combo;
    let n = 0;
    for (const k of finalClear) { const [r, c] = k.split(',').map(Number); const g = grid[r][c]; if (g) { g.dying = true; n++; const p = cellPos(r, c); burst(p.x, p.y, g.color, 5); } }
    let gained = n * 10 * mult;
    if (specials.size) gained += specials.size * 40;
    score += gained;
    if (combo >= 2) showText(W / 2, BY - 16, 'COMBO x' + combo + '  +' + gained, '#ffd23e');
    sfxClear(Math.min(6, combo));
    if (score > best) { best = score; localStorage.setItem('joyasBest', best.toString()); }

    pendingClear = finalClear; pendingSpecials = specials;
    phase = 'clearAnim';
    return true;
  }

  function finishClear() {
    for (const k of pendingClear) { const [r, c] = k.split(',').map(Number); grid[r][c] = null; }
    for (const [k, kind] of pendingSpecials) { const [r, c] = k.split(',').map(Number); const g = grid[r][c]; if (g) { g.special = kind; g.dying = false; g.scale = 1; g._trig = false; } }
    pendingClear = null; pendingSpecials = null;
    applyGravity();
    phase = 'fallAnim';
    sfxDrop();
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let write = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c]) { if (r !== write) { grid[write][c] = grid[r][c]; grid[r][c] = null; } setTarget(write, c, grid[write][c]); write--; }
      }
      let above = -1;
      for (let r = write; r >= 0; r--) {
        const g = makeGem(Math.floor(rand(0, NC)));
        const cp = cellPos(r, c); g.px = cp.x; g.py = BY + above * CELL + CELL / 2; setTarget(r, c, g);
        grid[r][c] = g; above--;
      }
    }
  }

  // ---------- deadlock ----------
  function colorAt(r, c) { return grid[r][c] ? grid[r][c].color : -1; }
  function matchExistsColors() {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const col = colorAt(r, c); if (col < 0) continue;
      if (c <= COLS - 3 && colorAt(r, c+1) === col && colorAt(r, c+2) === col) return true;
      if (r <= ROWS - 3 && colorAt(r+1, c) === col && colorAt(r+2, c) === col) return true;
    }
    return false;
  }
  function hasAnyMove() {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (grid[r][c] && grid[r][c].special) return true; // specials are always usable
      // swap right
      if (c < COLS - 1) { swapColors(r, c, r, c+1); const m = matchExistsColors(); swapColors(r, c, r, c+1); if (m) return true; }
      if (r < ROWS - 1) { swapColors(r, c, r+1, c); const m = matchExistsColors(); swapColors(r, c, r+1, c); if (m) return true; }
    }
    return false;
  }
  function swapColors(r1, c1, r2, c2) { const t = grid[r1][c1].color; grid[r1][c1].color = grid[r2][c2].color; grid[r2][c2].color = t; }
  function reshuffle() {
    showText(W / 2, BY - 16, 'sin movidas — mezclando', '#c084fc');
    let tries = 0;
    do {
      const cols = [];
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) cols.push(grid[r][c].color);
      for (let i = cols.length - 1; i > 0; i--) { const j = Math.floor(rand(0, i + 1)); [cols[i], cols[j]] = [cols[j], cols[i]]; }
      let idx = 0;
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { grid[r][c].color = cols[idx++]; grid[r][c].special = null; const cp = cellPos(r, c); grid[r][c].px = cp.x; grid[r][c].py = BY - 100 - r * 6; setTarget(r, c, grid[r][c]); }
      tries++;
    } while ((matchExistsColors() || !hasAnyMove()) && tries < 40);
    phase = 'fallAnim';
  }

  // ---------- input ----------
  function trySwap(a, b) {
    const ga = grid[a.r][a.c], gb = grid[b.r][b.c];
    grid[a.r][a.c] = gb; grid[b.r][b.c] = ga;
    setTarget(a.r, a.c, gb); setTarget(b.r, b.c, ga);
    pending = { a, b }; combo = 0; phase = 'swapAnim'; sfxSwap();
  }
  let downCell = null;
  function onDown(x, y) {
    if (state !== 'play') { reset(); return; }
    initAudio();
    if (phase !== 'idle') return;
    downCell = cellAt(x, y);
  }
  function onUp(x, y) {
    if (state !== 'play' || phase !== 'idle') { downCell = null; return; }
    const up = cellAt(x, y);
    if (!downCell || !up) { downCell = null; return; }
    if (downCell.r === up.r && downCell.c === up.c) {
      if (!sel) sel = up;
      else if (sel.r === up.r && sel.c === up.c) sel = null;
      else if (adjacent(sel, up)) { trySwap(sel, up); sel = null; }
      else sel = up;
    } else if (adjacent(downCell, up)) { trySwap(downCell, up); sel = null; }
    else sel = null;
    downCell = null;
  }
  function canvasPos(e) { const rect = canvas.getBoundingClientRect(); return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) }; }
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); const p = canvasPos(e); onDown(p.x, p.y); });
  canvas.addEventListener('pointerup', e => { e.preventDefault(); const p = canvasPos(e); onUp(p.x, p.y); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') window.location.href = 'index.html'; });
  document.addEventListener('click', initAudio, { once: true });

  // ---------- update ----------
  function settledPositions() {
    let ok = true;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { const g = grid[r][c]; if (g && (Math.abs(g.px - g.tx) > 0.7 || Math.abs(g.py - g.ty) > 0.7)) ok = false; }
    return ok;
  }
  function update() {
    if (state !== 'play') return;
    frame++;
    if (shake > 0.2) shake *= 0.85; else shake = 0;
    const K = window.__fast ? 1 : 0.32;

    // animate positions
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { const g = grid[r][c]; if (g) { g.px += (g.tx - g.px) * K; g.py += (g.ty - g.py) * K; } }

    if (phase === 'swapAnim') {
      if (settledPositions()) {
        if (!beginResolve([pending.a, pending.b])) {
          // revert
          const a = pending.a, b = pending.b;
          const ga = grid[a.r][a.c], gb = grid[b.r][b.c];
          grid[a.r][a.c] = gb; grid[b.r][b.c] = ga;
          setTarget(a.r, a.c, gb); setTarget(b.r, b.c, ga);
          phase = 'revertAnim'; sfxBad();
        }
      }
    } else if (phase === 'revertAnim') {
      if (settledPositions()) { pending = null; phase = 'idle'; }
    } else if (phase === 'clearAnim') {
      let alive = false;
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { const g = grid[r][c]; if (g && g.dying) { g.scale -= window.__fast ? 1 : 0.16; if (g.scale > 0.02) alive = true; } }
      if (!alive) finishClear();
    } else if (phase === 'fallAnim') {
      // grow spawned gems
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { const g = grid[r][c]; if (g && g.scale < 1) g.scale = Math.min(1, g.scale + 0.2); }
      if (settledPositions()) {
        if (!beginResolve(null)) {
          combo = 0;
          if (!hasAnyMove()) reshuffle(); else phase = 'idle';
        }
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.93; p.vy *= 0.93; p.life -= p.decay; if (p.life <= 0) particles.splice(i, 1); }
    for (let i = texts.length - 1; i >= 0; i--) { const t = texts[i]; t.y += t.vy; t.life -= 0.014; if (t.life <= 0) texts.splice(i, 1); }
  }

  // ---------- draw ----------
  function gemPath(ci, x, y, s) {
    ctx.beginPath();
    if (ci === 0) { ctx.arc(x, y, s, 0, Math.PI * 2); }
    else if (ci === 1) { ctx.moveTo(x, y - s); ctx.lineTo(x + s, y); ctx.lineTo(x, y + s); ctx.lineTo(x - s, y); ctx.closePath(); }
    else if (ci === 2) { ctx.moveTo(x, y - s); ctx.lineTo(x + s * 0.92, y + s * 0.62); ctx.lineTo(x - s * 0.92, y + s * 0.62); ctx.closePath(); }
    else if (ci === 3) { const r = s * 0.86; ctx.roundRect(x - r, y - r, r * 2, r * 2, 5); }
    else if (ci === 4) { for (let i = 0; i < 6; i++) { const a = Math.PI / 6 + i / 6 * Math.PI * 2; ctx[i ? 'lineTo' : 'moveTo'](x + Math.cos(a) * s, y + Math.sin(a) * s); } ctx.closePath(); }
    else { for (let i = 0; i < 10; i++) { const a = -Math.PI / 2 + i / 10 * Math.PI * 2; const rr = i % 2 ? s * 0.46 : s; ctx[i ? 'lineTo' : 'moveTo'](x + Math.cos(a) * rr, y + Math.sin(a) * rr); } ctx.closePath(); }
  }
  function drawGem(g) {
    const ci = g.color, s = RAD * g.scale;
    if (s < 0.5) return;
    const col = COLORS[ci];
    ctx.save();
    ctx.shadowBlur = g.special ? 16 : 8; ctx.shadowColor = col;
    const grad = ctx.createRadialGradient(g.px - s * 0.35, g.py - s * 0.35, 1, g.px, g.py, s);
    grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.25, col); grad.addColorStop(1, shade(col, -0.35));
    ctx.fillStyle = grad;
    gemPath(ci, g.px, g.py, s); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; gemPath(ci, g.px, g.py, s); ctx.stroke();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.beginPath(); ctx.ellipse(g.px - s * 0.3, g.py - s * 0.36, s * 0.22, s * 0.13, -0.6, 0, Math.PI * 2); ctx.fill();
    if (g.special === 'line') {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.moveTo(g.px - s, g.py); ctx.lineTo(g.px + s, g.py); ctx.moveTo(g.px, g.py - s); ctx.lineTo(g.px, g.py + s); ctx.stroke();
    } else if (g.special === 'bomb') {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.arc(g.px, g.py, s * 0.55, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(g.px, g.py, s * 0.22, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16); let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    r = Math.max(0, Math.min(255, r + amt * 255)); g = Math.max(0, Math.min(255, g + amt * 255)); b = Math.max(0, Math.min(255, b + amt * 255));
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  function draw() {
    ctx.fillStyle = '#0c0a18'; ctx.fillRect(0, 0, W, H);
    // HUD
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c084fc'; ctx.font = 'bold 13px sans-serif'; ctx.fillText('PUNTOS', 24, 46);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 30px sans-serif'; ctx.fillText(score != null ? score.toLocaleString('es') : '0', 24, 74);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#c084fc'; ctx.font = 'bold 13px sans-serif'; ctx.fillText('RÉCORD', W - 24, 46);
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = 'bold 22px sans-serif'; ctx.fillText((best || 0).toLocaleString('es'), W - 24, 76);

    ctx.save();
    if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));
    // board bg
    ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.strokeStyle = 'rgba(192,132,252,0.18)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(BX - 8, BY - 8, COLS * CELL + 16, ROWS * CELL + 16, 14); ctx.fill(); ctx.stroke();
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { if ((r + c) % 2 === 0) { ctx.fillStyle = 'rgba(255,255,255,0.025)'; ctx.fillRect(BX + c * CELL, BY + r * CELL, CELL, CELL); } }
    // selection
    if (sel) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.roundRect(BX + sel.c * CELL + 3, BY + sel.r * CELL + 3, CELL - 6, CELL - 6, 8); ctx.stroke(); }
    // gems
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { const g = grid[r][c]; if (g) drawGem(g); }
    // particles
    for (const p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); }
    ctx.globalAlpha = 1;
    for (const t of texts) { ctx.globalAlpha = Math.max(0, t.life); ctx.fillStyle = t.color; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(t.msg, t.x, t.y); }
    ctx.globalAlpha = 1;
    ctx.restore();

    // hint
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('tocá dos gemas vecinas o deslizá para intercambiar', W / 2, BY + ROWS * CELL + 28);
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  // boot
  best = parseInt(localStorage.getItem('joyasBest') || '0', 10);
  newBoard(); particles = []; texts = []; score = 0; combo = 0; frame = 0; shake = 0;
  loop();
</script>
</body>
