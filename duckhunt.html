<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔫 Duck Hunt</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
body {
  background: #0a0a12;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif; color: #fff;
}
#menuLink {
  position: absolute; top: 16px; left: 16px;
  padding: 8px 18px; border: none; border-radius: 30px;
  background: rgba(255,255,255,0.08); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer; z-index: 5;
  text-decoration: none; transition: background 0.15s;
}
#menuLink:hover { background: rgba(255,255,255,0.18); }
#app { width: min(98vw, 1100px); display: flex; flex-direction: column; gap: 10px; align-items: center; }
.head { display: flex; width: 100%; gap: 10px; }
.scorebox {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 8px 14px; text-align: center; flex: 1;
}
.scorebox .lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
.scorebox .v { font-size: 22px; font-weight: 700; line-height: 1.2; }
.scorebox.best .v { color: #ffb347; }
#boardWrap { position: relative; width: 100%; }
canvas {
  display: block; width: 100%; height: auto; touch-action: none; border-radius: 16px;
  max-width: 98vw; max-height: 86vh; cursor: none;
}
#overlay {
  position: absolute; inset: 0; display: none;
  flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  background: rgba(8,8,20,0.85); border-radius: 16px; backdrop-filter: blur(4px);
  text-align: center; z-index: 3;
}
#overlay h2 { font-size: 38px; letter-spacing: 2px; color: #ffb347; }
#overlay p { font-size: 15px; color: rgba(255,255,255,0.5); }
#overlay .final { font-size: 28px; color: #fff; font-weight: 700; margin-top: 4px; }
#overlay .btns { display: flex; gap: 10px; margin-top: 6px; }
#overlay button {
  padding: 11px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.12s;
}
#overlay button:hover { transform: scale(1.04); }
#againBtn { background: #ffb347; color: #0a0a12; }
.hint { font-size: 12px; color: rgba(255,255,255,0.22); text-align: center; width: 100%; }
</style>
</head>
<body>
<a id="menuLink" href="index.html">← menú</a>
<div id="app">
  <div class="head">
    <div class="scorebox"><div class="lbl">pato</div><div class="v" id="duckDisplay">1/3</div></div>
    <div class="scorebox"><div class="lbl">vidas</div><div class="v" id="livesDisplay">❤️❤️❤️</div></div>
    <div class="scorebox"><div class="lbl">puntos</div><div class="v" id="scoreDisplay">0</div></div>
    <div class="scorebox best"><div class="lbl">récord</div><div class="v" id="bestDisplay">0</div></div>
  </div>
  <div id="boardWrap">
    <canvas id="c" width="1000" height="650"></canvas>
    <div id="overlay">
      <h2>🔫 FIN DE LA CACERÍA</h2>
      <p id="ovSub"></p>
      <div class="final" id="ovFinal"></div>
      <div class="btns"><button id="againBtn">cazar de nuevo</button></div>
    </div>
  </div>
  <div class="hint">apuntá y hacé clic para disparar · los patos vuelan más rápido cada ronda · R · Escape</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1000, H = 650;

const GRASS_Y = 530;
const SKY_TOP = 0, SKY_BOT = GRASS_Y;

let score = 0, best = 0, lives = 3;
let round = 1, duckNum = 1;
let ducks = [];
let gameOver = false;
let mx = W / 2, my = H / 2;
let shootFlash = 0;
let particles = [];
let floatTexts = [];
let bird = null; // current bird
// Dog state
let dogState = 'idle'; // idle | laugh | fetch
let dogTimer = 0;
let birdsPerRound = 3;
let roundDelay = false;

let actx;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(f, d, t = 'sine', v = 0.05) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = t; o.frequency.value = f;
  g.gain.setValueAtTime(v, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
  o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + d);
}
function sfxShoot() {
  tone(80, 0.15, 'sawtooth', 0.08);
  setTimeout(() => tone(40, 0.2, 'sawtooth', 0.04), 30);
  // Add noise burst
  if (actx) {
    const bufSz = actx.sampleRate * 0.08;
    const buf = actx.createBuffer(1, bufSz, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufSz * 4);
    const src = actx.createBufferSource();
    src.buffer = buf;
    const g = actx.createGain(); g.gain.value = 0.15;
    src.connect(g); g.connect(actx.destination); src.start();
  }
}
function sfxDuckFall() { tone(300, 0.04, 'triangle', 0.03); setTimeout(() => tone(200, 0.06, 'triangle', 0.02), 40); }
function sfxMiss() { tone(120, 0.15, 'sawtooth', 0.04); }
function sfxRound() { [440,554,659].forEach((f,i)=>setTimeout(()=>tone(f,0.08,'square',0.04), i*60)); }

function addParticles(x, y, color, count, spd) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (spd || 3) + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, life: 1, decay: 0.01 + Math.random() * 0.025, color, size: 2 + Math.random() * 4 });
  }
}

function addFloatText(x, y, text, color, size) {
  floatTexts.push({ x, y, text, color, size: size || 22, life: 1, vy: -2 });
}

function spawnDuck() {
  const fromLeft = Math.random() < 0.5;
  const speed = 1.5 + round * 0.6 + (3 - birdsPerRound) * 0.2;
  const amp = 30 + Math.random() * 40;
  const freq = 0.02 + Math.random() * 0.015;
  const startY = 80 + Math.random() * 250;
  bird = {
    x: fromLeft ? -50 : W + 50,
    y: startY,
    speed: fromLeft ? speed : -speed,
    amplitude: amp,
    frequency: freq,
    phase: Math.random() * Math.PI * 2,
    alive: true,
    falling: false,
    fallSpeed: 0,
    rotation: 0,
    fromLeft,
    baseY: startY,
    distTraveled: 0,
  };
  document.getElementById('duckDisplay').textContent = `${duckNum}/${birdsPerRound}`;
}

function shoot() {
  if (gameOver || !bird || !bird.alive || bird.falling || roundDelay) return;
  initAudio();
  sfxShoot();
  shootFlash = 8;

  // Check if hit the duck
  const dx = mx - bird.x, dy = my - bird.y;
  const hitRadius = 35;
  const hit = Math.sqrt(dx * dx + dy * dy) < hitRadius;

  if (hit) {
    bird.alive = false;
    bird.falling = true;
    bird.fallSpeed = 0;
    sfxDuckFall();
    const bonus = Math.floor(3 + round * 0.5);
    score += bonus;
    if (score > best) { best = score; localStorage.setItem('duckhuntBest', best.toString()); }
    updateUI();
    addParticles(bird.x, bird.y, '#ffb347', 15);
    addParticles(bird.x, bird.y, '#ff5d5d', 10);
    addFloatText(bird.x, bird.y - 30, `+${bonus} 🔫`, '#ffb347', 24);
    dogState = 'fetch';
    dogTimer = 60;
    // Next duck after delay
    setTimeout(nextDuck, 1200);
  } else {
    sfxMiss();
    addParticles(mx, my, 'rgba(255,255,200', 6, 2);
  }
}

function nextDuck() {
  if (gameOver) return;
  duckNum++;
  if (duckNum > birdsPerRound) {
    // Round complete
    round++;
    duckNum = 1;
    birdsPerRound = Math.min(5, 3 + Math.floor(round / 2));
    sfxRound();
    roundDelay = true;
    dogState = 'idle';
    setTimeout(() => {
      roundDelay = false;
      spawnDuck();
    }, 1500);
  } else {
    spawnDuck();
  }
}

function missDuck() {
  if (!bird || !bird.alive || bird.falling) return;
  bird.alive = false;
  lives--;
  updateUI();
  dogState = 'laugh';
  dogTimer = 90;
  sfxMiss();
  if (lives <= 0) {
    gameOver = true;
    if (score > best) { best = score; localStorage.setItem('duckhuntBest', best.toString()); }
    setTimeout(() => {
      document.getElementById('ovSub').textContent = `puntos: ${score}`;
      document.getElementById('ovFinal').textContent = `🏆 ${score} pts`;
      document.getElementById('overlay').style.display = 'flex';
    }, 1200);
  } else {
    setTimeout(nextDuck, 1500);
  }
}

function updateUI() {
  document.getElementById('duckDisplay').textContent = bird && bird.alive && !bird.falling ? `${duckNum}/${birdsPerRound}` : '—';
  document.getElementById('livesDisplay').textContent = '❤️'.repeat(Math.max(0, lives)) || '💀';
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('bestDisplay').textContent = best;
}

function init() {
  score = 0; lives = 3; round = 1; duckNum = 1; birdsPerRound = 3; gameOver = false;
  bird = null; particles = []; floatTexts = []; roundDelay = false; dogState = 'idle'; dogTimer = 0;
  best = parseInt(localStorage.getItem('duckhuntBest') || '0', 10);
  document.getElementById('overlay').style.display = 'none';
  updateUI();
  spawnDuck();
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GRASS_Y);
  grad.addColorStop(0, '#1a4a8a');
  grad.addColorStop(0.3, '#3a7abf');
  grad.addColorStop(0.6, '#6ab0e6');
  grad.addColorStop(0.85, '#8ac8f0');
  grad.addColorStop(1, '#a0d8f8');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, GRASS_Y);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  const cloudPositions = [
    [120, 60, 50], [350, 90, 40], [600, 50, 55], [820, 80, 35],
    [200, 140, 45], [500, 120, 50], [750, 150, 40],
  ];
  for (const [cx, cy, r] of cloudPositions) {
    ctx.beginPath();
    ctx.arc(cx - r * 0.4, cy, r * 0.6, 0, Math.PI * 2);
    ctx.arc(cx + r * 0.3, cy - r * 0.1, r * 0.5, 0, Math.PI * 2);
    ctx.arc(cx + r * 0.6, cy, r * 0.45, 0, Math.PI * 2);
    ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround() {
  // Grass
  const grassGrad = ctx.createLinearGradient(0, GRASS_Y, 0, H);
  grassGrad.addColorStop(0, '#4a8a2a');
  grassGrad.addColorStop(0.15, '#3a7a1a');
  grassGrad.addColorStop(0.5, '#2a5a12');
  grassGrad.addColorStop(1, '#1a3a0a');
  ctx.fillStyle = grassGrad; ctx.fillRect(0, GRASS_Y, W, H - GRASS_Y);

  // Grass blades
  ctx.strokeStyle = 'rgba(50,120,20,0.3)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 6) {
    const h = 4 + Math.random() * 12;
    ctx.beginPath(); ctx.moveTo(x, GRASS_Y); ctx.lineTo(x + (Math.random() - 0.5) * 4, GRASS_Y - h); ctx.stroke();
  }

  // Fence
  ctx.fillStyle = '#5a3a1a';
  for (let x = 0; x < W; x += 80) {
    ctx.fillRect(x, GRASS_Y - 30, 6, 30);
  }
  ctx.fillRect(0, GRASS_Y - 16, W, 4);
  ctx.fillRect(0, GRASS_Y - 6, W, 4);
}

function drawDuck(duck) {
  if (!duck || (!duck.alive && !duck.falling)) return;
  const x = duck.x, y = duck.y;
  ctx.save();
  ctx.translate(x, y);

  if (duck.falling) {
    duck.rotation += 0.08;
    ctx.rotate(duck.rotation);
  } else {
    const tilt = Math.sin(Date.now() * 0.005 + duck.phase) * 0.1;
    ctx.rotate(tilt);
    if (!duck.fromLeft) ctx.scale(-1, 1);
  }

  // Body
  ctx.fillStyle = '#2a6a2a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 22, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#4a8a4a';
  ctx.beginPath();
  ctx.ellipse(-4, 3, 14, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  if (!duck.falling) {
    const wingFlap = Math.sin(Date.now() * 0.012 + duck.phase) * 0.4 + 0.6;
    ctx.fillStyle = '#1a5a1a';
    ctx.beginPath();
    ctx.ellipse(-6, -8, 14, 6 * wingFlap, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Neck
  ctx.fillStyle = '#2a6a2a';
  ctx.fillRect(16, -8, 8, 10);

  // Head
  ctx.fillStyle = '#1a5a2a';
  ctx.beginPath();
  ctx.arc(22, -10, 8, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(24, -12, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(25, -12, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e8a020';
  ctx.beginPath();
  ctx.moveTo(28, -9);
  ctx.lineTo(40, -6);
  ctx.lineTo(28, -4);
  ctx.closePath();
  ctx.fill();

  // Tail
  ctx.fillStyle = '#1a5a1a';
  ctx.beginPath();
  ctx.moveTo(-22, -4);
  ctx.lineTo(-34, -12);
  ctx.lineTo(-30, -2);
  ctx.lineTo(-36, 2);
  ctx.lineTo(-22, 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawDog() {
  const dx = 140, dy = GRASS_Y - 8;
  ctx.save();
  ctx.translate(dx, dy);

  if (dogState === 'laugh') {
    // Sitting and laughing
    // Body
    ctx.fillStyle = '#8a6a3a';
    ctx.beginPath(); ctx.ellipse(0, -12, 20, 16, 0, 0, Math.PI * 2); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(20, -30, 14, 0, Math.PI * 2); ctx.fill();
    // Ears
    ctx.fillStyle = '#6a4a2a';
    ctx.beginPath(); ctx.ellipse(10, -42, 6, 12, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(28, -42, 6, 12, -0.3, 0, Math.PI * 2); ctx.fill();
    // Eyes (closed laughing)
    ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(16, -32, 3, 0, Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.arc(24, -32, 3, 0, Math.PI); ctx.stroke();
    // Mouth open
    ctx.fillStyle = '#4a2a1a';
    ctx.beginPath(); ctx.arc(20, -22, 5, 0, Math.PI); ctx.fill();
    ctx.fillStyle = '#d44'; ctx.beginPath(); ctx.arc(20, -22, 3, 0, Math.PI); ctx.fill();
  } else if (dogState === 'fetch') {
    // Running with duck
    const off = (60 - dogTimer) * 0.5;
    ctx.translate(off, 0);
    ctx.fillStyle = '#8a6a3a';
    ctx.beginPath(); ctx.ellipse(0, -12, 20, 16, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(20, -30, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#6a4a2a';
    ctx.beginPath(); ctx.ellipse(10, -42, 6, 12, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(28, -42, 6, 12, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(16, -32, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(24, -32, 2.5, 0, Math.PI * 2); ctx.fill();
    // Legs
    ctx.strokeStyle = '#6a4a2a'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-8, 2); ctx.lineTo(-12, 14 + Math.sin(Date.now() * 0.01) * 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4, 2); ctx.lineTo(8, 14 + Math.cos(Date.now() * 0.01) * 4); ctx.stroke();
    // Duck in mouth
    ctx.font = "20px 'Segoe UI Emoji', sans-serif"; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🦆', 30, -24);
  } else {
    // Idle sitting
    ctx.fillStyle = '#8a6a3a';
    ctx.beginPath(); ctx.ellipse(0, -12, 20, 16, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(20, -30, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#6a4a2a';
    ctx.beginPath(); ctx.ellipse(10, -42, 6, 12, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(28, -42, 6, 12, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(16, -32, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(24, -32, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(20, -22, 2, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

function drawCrosshair(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Outer ring
  ctx.strokeStyle = 'rgba(255,50,50,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.stroke();

  // Cross lines
  const gap = 4, len = 22;
  ctx.strokeStyle = 'rgba(255,50,50,0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-len, 0); ctx.lineTo(-gap, 0);
  ctx.moveTo(gap, 0); ctx.lineTo(len, 0);
  ctx.moveTo(0, -len); ctx.lineTo(0, -gap);
  ctx.moveTo(0, gap); ctx.lineTo(0, len);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(255,50,50,0.8)';
  ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawClouds();
  drawGround();

  // Duck
  if (bird && (bird.alive || bird.falling)) {
    drawDuck(bird);
  }

  // Dog
  drawDog();

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Float texts
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i]; ft.y += ft.vy; ft.life -= 0.012;
    if (ft.life <= 0) { floatTexts.splice(i, 1); continue; }
    ctx.globalAlpha = Math.min(1, ft.life * 2);
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Shoot flash
  if (shootFlash > 0) {
    ctx.fillStyle = `rgba(255,255,200,${shootFlash * 0.03})`;
    ctx.beginPath(); ctx.arc(mx, my, 60 + (8 - shootFlash) * 8, 0, Math.PI * 2); ctx.fill();
    shootFlash--;
  }

  // Crosshair
  if (!gameOver) drawCrosshair(mx, my);

  // Round announcement
  if (roundDelay) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(W / 2 - 120, H / 2 - 30, 240, 60, 12); ctx.fill();
    ctx.fillStyle = '#ffb347';
    ctx.font = "bold 28px 'Segoe UI', sans-serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`Ronda ${round}`, W / 2, H / 2);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function update() {
  if (gameOver || roundDelay) return;

  if (bird) {
    if (bird.alive && !bird.falling) {
      bird.x += bird.speed;
      bird.distTraveled += Math.abs(bird.speed);
      bird.y = bird.baseY + Math.sin(bird.distTraveled * bird.frequency + bird.phase) * bird.amplitude;
      bird.y = Math.max(20, Math.min(GRASS_Y - 60, bird.y));

      // Check if duck escaped
      if (bird.x < -80 || bird.x > W + 80) {
        missDuck();
      }
    } else if (bird.falling) {
      bird.fallSpeed += 0.4;
      bird.y += bird.fallSpeed;
      bird.x += Math.sin(bird.rotation) * 2;
      if (bird.y > GRASS_Y) {
        bird.falling = false;
        bird = null;
      }
    }
  }

  // Dog timer
  if (dogTimer > 0) {
    dogTimer--;
    if (dogTimer <= 0) {
      dogState = 'idle';
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  mx = Math.max(0, Math.min(W, (e.clientX - rect.left) * sx));
  my = Math.max(0, Math.min(H, (e.clientY - rect.top) * sy));
});

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  mx = Math.max(0, Math.min(W, (e.clientX - rect.left) * sx));
  my = Math.max(0, Math.min(H, (e.clientY - rect.top) * sy));
  shoot();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); if (gameOver) return;
  const t = e.touches[0]; const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  mx = Math.max(0, Math.min(W, (t.clientX - rect.left) * sx));
  my = Math.max(0, Math.min(H, (t.clientY - rect.top) * sy));
  shoot();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0]; const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  mx = Math.max(0, Math.min(W, (t.clientX - rect.left) * sx));
  my = Math.max(0, Math.min(H, (t.clientY - rect.top) * sy));
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { window.location.href = 'index.html'; }
  if (e.key === 'r' || e.key === 'R') { init(); }
  if ((e.key === ' ' || e.key === 'Space') && !gameOver) { e.preventDefault(); shoot(); }
});

document.getElementById('againBtn').addEventListener('click', () => { initAudio(); init(); });
document.addEventListener('click', () => initAudio(), { once: true });

init();
loop();
</script>
