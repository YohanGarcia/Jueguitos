<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔢 2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #fff;
  }
  #menuLink {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 8px 18px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 5;
    text-decoration: none;
    transition: background 0.15s;
  }
  #menuLink:hover { background: rgba(255,255,255,0.18); }

  #app { width: min(92vw, 460px); display: flex; flex-direction: column; gap: 18px; }
  .head { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .title { display: flex; align-items: baseline; gap: 10px; }
  .title h1 { font-size: 44px; font-weight: 800; letter-spacing: -1px; color: #f2b53e; }
  .title .sub { font-size: 12px; color: rgba(255,255,255,0.35); }
  .scores { display: flex; gap: 10px; }
  .scorebox {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
    min-width: 80px;
  }
  .scorebox .lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .scorebox .v { font-size: 22px; font-weight: 700; line-height: 1.1; }
  .scorebox.best .v { color: #f2b53e; }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .bar p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.4; }
  .bar p b { color: rgba(255,255,255,0.7); }
  #newBtn {
    padding: 10px 20px; border: none; border-radius: 10px;
    background: #f2b53e; color: #0a0a1a; font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform 0.12s; white-space: nowrap;
  }
  #newBtn:hover { transform: scale(1.04); }

  #boardWrap { position: relative; }
  canvas { display: block; width: 100%; height: auto; touch-action: none; border-radius: 16px; }
  #overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: rgba(10,10,26,0.82); border-radius: 16px; backdrop-filter: blur(3px);
    text-align: center;
  }
  #overlay h2 { font-size: 40px; letter-spacing: 2px; }
  #overlay h2.win { color: #f2b53e; }
  #overlay p { color: rgba(255,255,255,0.5); font-size: 15px; }
  #overlay .btns { display: flex; gap: 10px; margin-top: 6px; }
  #overlay button {
    padding: 11px 24px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.12s;
  }
  #overlay button:hover { transform: scale(1.04); }
  #againBtn { background: #f2b53e; color: #0a0a1a; }
  #keepBtn { background: rgba(255,255,255,0.12); color: #fff; }

  .hint { font-size: 12px; color: rgba(255,255,255,0.22); text-align: center; }
  @media (hover: none) and (pointer: coarse) { .hint { font-size: 12px; } }
</style>
</head>
<body>
<a id="menuLink" href="index.html">← menú</a>

<div id="app">
  <div class="head">
    <div class="title"><h1>2048</h1><span class="sub">fusioná hasta llegar</span></div>
    <div class="scores">
      <div class="scorebox"><div class="lbl">puntos</div><div class="v" id="score">0</div></div>
      <div class="scorebox best"><div class="lbl">récord</div><div class="v" id="best">0</div></div>
    </div>
  </div>

  <div class="bar">
    <p>Uní fichas iguales. <b>Flechas</b> o <b>deslizá</b> para mover.</p>
    <button id="newBtn">↻ nueva</button>
  </div>

  <div id="boardWrap">
    <canvas id="c" width="460" height="460"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">GAME OVER</h2>
      <p id="ovSub">no quedan movimientos</p>
      <div class="btns">
        <button id="keepBtn" style="display:none">seguir jugando</button>
        <button id="againBtn">jugar de nuevo</button>
      </div>
    </div>
  </div>

  <div class="hint">↑ ↓ ← → · deslizá en pantalla · R reinicia</div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovSub = document.getElementById('ovSub');
  const keepBtn = document.getElementById('keepBtn');

  const N = 4;
  const SIZE = 460, PAD = 14;
  const CELL = (SIZE - PAD * (N + 1)) / N;

  const COLORS = {
    2:    ['#2b2b40', '#cfcfe6'],
    4:    ['#39394f', '#e8e8f5'],
    8:    ['#f2b53e', '#0a0a1a'],
    16:   ['#f59838', '#0a0a1a'],
    32:   ['#f5733a', '#fff'],
    64:   ['#f24e3a', '#fff'],
    128:  ['#34c6ff', '#0a0a1a'],
    256:  ['#1f9eff', '#fff'],
    512:  ['#7c5cff', '#fff'],
    1024: ['#c05cff', '#fff'],
    2048: ['#2ee6a0', '#0a0a1a'],
    4096: ['#0a0a1a', '#2ee6a0'],
    8192: ['#0a0a1a', '#f2b53e'],
  };

  let grid, score, best, tiles, anims, over, won, keptGoing;

  // Audio
  let actx;
  function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
  function tone(f, d, t = 'sine', v = 0.05) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = t; o.frequency.value = f;
    g.gain.setValueAtTime(v, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + d);
  }
  function sfxMove() { tone(220, 0.05, 'triangle', 0.03); }
  function sfxMerge(v) { tone(330 + Math.log2(v) * 40, 0.09, 'square', 0.045); }
  function sfxWin() { if (actx) [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'square',0.06), i*100)); }
  function sfxOver() { if (actx) [392,330,262,196].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'sawtooth',0.05), i*120)); }

  function empty() { return Array.from({ length: N }, () => Array(N).fill(0)); }

  function addRandom() {
    const free = [];
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (grid[r][c] === 0) free.push([r, c]);
    if (!free.length) return;
    const [r, c] = free[Math.floor(Math.random() * free.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    anims.push({ r, c, type: 'spawn', t: 0 });
  }

  function init() {
    grid = empty();
    score = 0; over = false; won = false; keptGoing = false;
    anims = [];
    best = parseInt(localStorage.getItem('g2048Best') || '0', 10);
    addRandom(); addRandom();
    overlay.style.display = 'none';
    updateScore();
    draw();
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) { best = score; localStorage.setItem('g2048Best', best.toString()); }
    bestEl.textContent = best;
  }

  // Slide a single row to the left; returns {row, moved, gained, merges:[col]}
  function slideRow(row) {
    const nums = row.filter(v => v !== 0);
    const out = []; let gained = 0; const mergedAt = [];
    for (let i = 0; i < nums.length; i++) {
      if (i + 1 < nums.length && nums[i] === nums[i + 1]) {
        const v = nums[i] * 2;
        out.push(v); gained += v; mergedAt.push(out.length - 1);
        i++;
      } else out.push(nums[i]);
    }
    while (out.length < N) out.push(0);
    return { row: out, gained, mergedAt };
  }

  function rotateCW(g) {
    const r = empty();
    for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) r[j][N - 1 - i] = g[i][j];
    return r;
  }
  function rotateCCW(g) {
    const r = empty();
    for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) r[N - 1 - j][i] = g[i][j];
    return r;
  }

  function move(dir) {
    if (over && !keptGoing) return;
    initAudio();
    // normalize so we always slide left
    let g = grid.map(r => [...r]);
    let rotations = 0;
    if (dir === 'up') { g = rotateCCW(g); rotations = 1; }
    else if (dir === 'down') { g = rotateCW(g); rotations = 3; }
    else if (dir === 'right') { g = rotateCW(rotateCW(g)); rotations = 2; }

    let moved = false, gainedTotal = 0; const merges = [];
    for (let r = 0; r < N; r++) {
      const before = g[r].join(',');
      const res = slideRow(g[r]);
      g[r] = res.row;
      if (g[r].join(',') !== before) moved = true;
      gainedTotal += res.gained;
      res.mergedAt.forEach(c => merges.push([r, c]));
    }

    if (!moved) return;

    // rotate back
    let back = g;
    const inv = { 1: 3, 3: 1, 2: 2, 0: 0 }[rotations];
    for (let i = 0; i < inv; i++) back = rotateCW(back);

    grid = back;
    score += gainedTotal;
    sfxMove();

    // merge animations & sounds: map merged positions back to real grid coords
    // (recompute by scanning for tiles that match a merged value isn't reliable; we map via rotation)
    let markGrid = empty();
    for (const [r, c] of merges) markGrid[r][c] = 1;
    for (let i = 0; i < inv; i++) markGrid = rotateCW(markGrid);
    let anyMerge = false;
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      if (markGrid[r][c]) { anims.push({ r, c, type: 'merge', t: 0 }); anyMerge = true; }
    }
    if (anyMerge) sfxMerge(gainedTotal || 4);

    addRandom();
    updateScore();

    // win check
    if (!won && grid.some(row => row.some(v => v >= 2048))) {
      won = true; keptGoing = false;
      sfxWin();
      showOverlay(true);
    } else if (isStuck()) {
      over = true;
      sfxOver();
      showOverlay(false);
    }
    draw();
  }

  function isStuck() {
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      if (grid[r][c] === 0) return false;
      if (c + 1 < N && grid[r][c] === grid[r][c + 1]) return false;
      if (r + 1 < N && grid[r][c] === grid[r + 1][c]) return false;
    }
    return true;
  }

  function showOverlay(win) {
    if (win) {
      ovTitle.textContent = '¡2048!';
      ovTitle.className = 'win';
      ovSub.textContent = 'lo lograste — ¿seguís por más?';
      keepBtn.style.display = 'inline-block';
    } else {
      ovTitle.textContent = 'GAME OVER';
      ovTitle.className = '';
      ovSub.textContent = `sin movimientos · ${score} puntos`;
      keepBtn.style.display = 'none';
    }
    overlay.style.display = 'flex';
  }

  function cellXY(r, c) {
    return [PAD + c * (CELL + PAD), PAD + r * (CELL + PAD)];
  }

  function roundRect(x, y, w, h, rad) {
    ctx.beginPath();
    ctx.moveTo(x + rad, y);
    ctx.arcTo(x + w, y, x + w, y + h, rad);
    ctx.arcTo(x + w, y + h, x, y + h, rad);
    ctx.arcTo(x, y + h, x, y, rad);
    ctx.arcTo(x, y, x + w, y, rad);
    ctx.closePath();
  }

  function draw() {
    // board bg
    ctx.fillStyle = '#13131f';
    roundRect(0, 0, SIZE, SIZE, 16); ctx.fill();

    // empty cells
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      const [x, y] = cellXY(r, c);
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      roundRect(x, y, CELL, CELL, 10); ctx.fill();
    }

    // tiles
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      const v = grid[r][c];
      if (!v) continue;
      const [x, y] = cellXY(r, c);
      let scale = 1;
      const sp = anims.find(a => a.r === r && a.c === c && a.type === 'spawn');
      const mg = anims.find(a => a.r === r && a.c === c && a.type === 'merge');
      if (sp) scale = Math.min(1, sp.t / 8);
      if (mg) scale = 1 + Math.sin(Math.min(1, mg.t / 8) * Math.PI) * 0.14;

      const [bg, fg] = COLORS[v] || ['#0a0a1a', '#2ee6a0'];
      ctx.save();
      ctx.translate(x + CELL / 2, y + CELL / 2);
      ctx.scale(scale, scale);
      roundRect(-CELL / 2, -CELL / 2, CELL, CELL, 10);
      ctx.fillStyle = bg; ctx.fill();
      if (v >= 8) {
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        roundRect(-CELL / 2 + 5, -CELL / 2 + 5, CELL - 10, 8, 5); ctx.fill();
      }
      ctx.fillStyle = fg;
      const digits = String(v).length;
      ctx.font = `bold ${digits <= 2 ? 42 : digits === 3 ? 34 : 27}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(v, 0, 2);
      ctx.restore();
    }
  }

  // run a light animation ticker
  (function ticker() {
    if (anims && anims.length) {
      for (let i = anims.length - 1; i >= 0; i--) {
        anims[i].t++;
        if (anims[i].t > 9) anims.splice(i, 1);
      }
      draw();
    }
    requestAnimationFrame(ticker);
  })();

  // input
  document.addEventListener('keydown', e => {
    const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    else if (e.key === 'r' || e.key === 'R') init();
  });

  // swipe
  let tx = 0, ty = 0;
  canvas.addEventListener('touchstart', e => {
    initAudio();
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 24) return;
    if (ax > ay) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, { passive: true });

  document.getElementById('newBtn').addEventListener('click', () => { initAudio(); init(); });
  document.getElementById('againBtn').addEventListener('click', () => { initAudio(); init(); });
  keepBtn.addEventListener('click', () => { keptGoing = true; overlay.style.display = 'none'; });
  document.addEventListener('click', initAudio, { once: true });

  init();
</script>
</body>
</html>
