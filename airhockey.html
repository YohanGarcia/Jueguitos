<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏒 Air Hockey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --bg:#07070f; --bg2:#0d0d1a; --line:rgba(255,255,255,0.09); --line-hi:rgba(255,255,255,0.18); --txt:#f4f4fb; --mut:#8a8aa3; --mut2:#5b5b72; --gold:#ffcb52; --green:#2ee6a0; --red:#ff5e6c; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: radial-gradient(900px 560px at 50% -12%, #14142a 0%, rgba(20,20,42,0) 60%), var(--bg); color: var(--txt); font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; -webkit-font-smoothing: antialiased; user-select: none; }
  ::selection { background: var(--gold); color: #07070f; }
  #menuLink { position: absolute; top: 14px; left: 14px; z-index: 6; padding: 8px 16px; border-radius: 999px; background: rgba(255,255,255,0.07); border: 1px solid var(--line); color: var(--txt); font-size: 13px; font-weight: 600; text-decoration: none; transition: background .15s, border-color .15s; }
  #menuLink:hover { background: rgba(255,255,255,0.14); border-color: var(--line-hi); }
  #helpBtn { position: absolute; top: 14px; right: 14px; z-index: 6; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.07); border: 1px solid var(--line); color: var(--mut); font-size: 16px; font-weight: 700; cursor: pointer; }
  #helpBtn:hover { background: rgba(255,255,255,0.14); color: var(--txt); border-color: var(--line-hi); }
  #wrap { position: relative; }
  canvas { display: block; width: auto; height: auto; aspect-ratio: 420 / 660; max-width: calc(100vw - 32px); max-height: calc(100dvh - 32px); border-radius: 16px; box-shadow: 0 0 60px rgba(77,141,255,0.1); touch-action: none; }
  .layer { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 24px; border-radius: 16px; }
  #startLayer { background: rgba(7,7,15,0.55); backdrop-filter: blur(2px); }
  #overLayer { background: rgba(7,7,15,0.82); backdrop-filter: blur(4px); display: none; }
  .layer h1 { font-size: clamp(28px, 8vw, 40px); font-weight: 700; letter-spacing: -0.02em; text-transform: uppercase; }
  .layer h1 .o { color: var(--gold); }
  .layer h2 { font-size: 38px; font-weight: 700; } .layer h2.win { color: var(--green); } .layer h2.lose { color: var(--red); }
  .layer .sub { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.12em; color: var(--mut); text-transform: uppercase; }
  .layer button { margin-top: 4px; padding: 14px 36px; border: none; border-radius: 999px; background: var(--gold); color: #07070f; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; }
  #help { position: absolute; inset: 0; z-index: 12; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(7,7,15,0.9); backdrop-filter: blur(6px); }
  #help .panel { width: min(94vw, 380px); background: var(--bg2); border: 1px solid var(--line-hi); border-radius: 18px; padding: 24px 22px; }
  #help h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; } #help h2 .o { color: var(--gold); }
  #help ol { padding-left: 18px; } #help li { font-size: 14px; color: var(--mut); line-height: 1.55; margin-bottom: 9px; } #help li b { color: var(--txt); font-weight: 600; }
  #help button { width: 100%; margin-top: 12px; padding: 13px; border: none; border-radius: 999px; background: var(--gold); color: #07070f; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<a id="menuLink" href="index.html">← menú</a>
<button id="helpBtn" aria-label="Cómo se juega">?</button>

<div id="wrap">
  <canvas id="game" width="420" height="660"></canvas>
  <div class="layer" id="startLayer">
    <h1>Air Hocke<span class="o">y</span></h1>
    <div class="sub">primero a 7 goles</div>
    <button id="startBtn">jugar</button>
  </div>
  <div class="layer" id="overLayer">
    <h2 id="ovTitle" class="win">¡GANASTE!</h2>
    <div class="sub" id="ovSub">7 a 3</div>
    <button id="againBtn">revancha</button>
  </div>
</div>

<div id="help">
  <div class="panel">
    <h2>Cómo se juega <span class="o">·</span> Air Hocke<span class="o">y</span></h2>
    <ol>
      <li>Arrastrá tu paleta (la de <b>abajo</b>) con el dedo o el mouse.</li>
      <li>Golpeá el disco para meterlo en el <b>arco de arriba</b> de la máquina.</li>
      <li>El primero en marcar <b>7 goles</b> gana. ¡No dejes que te metan!</li>
    </ol>
    <button id="helpClose">¡a jugar!</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const startLayer = document.getElementById('startLayer');
  const overLayer = document.getElementById('overLayer');
  const TARGET = 7;
  const GOAL_W = W*0.42;
  const PR = 34, MR = 30; // puck radius, mallet radius

  let puck, you, cpu, youScore, cpuScore, playing, raf;

  let actx;
  function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state==='suspended') actx.resume(); }
  function tone(f,d,t='sine',v=0.05){ if(!actx)return; const o=actx.createOscillator(),g=actx.createGain(); o.type=t;o.frequency.value=f; const t0=actx.currentTime; g.gain.setValueAtTime(v,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+d); o.connect(g);g.connect(actx.destination);o.start(t0);o.stop(t0+d); }
  const sfxHit=()=>tone(300,0.05,'triangle',0.05);
  const sfxWall=()=>tone(200,0.04,'sine',0.03);
  const sfxGoal=()=>[660,880].forEach((f,i)=>setTimeout(()=>tone(f,0.14,'square',0.05),i*80));
  const sfxConcede=()=>tone(150,0.2,'sawtooth',0.05);

  function resetPuck(dir) {
    puck = { x: W/2, y: H/2, vx: (Math.random()-0.5)*3, vy: dir*4 };
  }
  function reset() {
    you = { x: W/2, y: H-70, px: W/2, py: H-70 };
    cpu = { x: W/2, y: 70 };
    youScore=0; cpuScore=0; playing=true;
    resetPuck(Math.random()<0.5?-1:1);
    startLayer.style.display='none'; overLayer.style.display='none';
    cancelAnimationFrame(raf); loop();
  }

  function circleHit(p, m, mr) {
    const dx=p.x-m.x, dy=p.y-m.y, d=Math.hypot(dx,dy), min=PR+mr;
    if (d<min && d>0) {
      const nx=dx/d, ny=dy/d;
      const overlap=min-d;
      p.x += nx*overlap; p.y += ny*overlap;
      const mvx=(m.x-(m.px??m.x)), mvy=(m.y-(m.py??m.y));
      const speed=Math.hypot(p.vx,p.vy);
      p.vx = nx*(speed*0.6+4) + mvx*0.5;
      p.vy = ny*(speed*0.6+4) + mvy*0.5;
      sfxHit();
    }
  }

  function update() {
    // cpu AI: chase puck when on its side, else return to center
    const targetX = puck.y < H/2 ? puck.x : W/2;
    const targetY = puck.y < H/2 ? Math.min(puck.y, H/2-50) : 70;
    cpu.px=cpu.x; cpu.py=cpu.y;
    const sp=4.6;
    cpu.x += Math.max(-sp,Math.min(sp,(targetX-cpu.x)*0.12));
    cpu.y += Math.max(-sp,Math.min(sp,(targetY-cpu.y)*0.12));
    cpu.x=Math.max(MR,Math.min(W-MR,cpu.x)); cpu.y=Math.max(MR,Math.min(H/2-MR,cpu.y));

    puck.x+=puck.vx; puck.y+=puck.vy;
    puck.vx*=0.995; puck.vy*=0.995;
    // walls
    if (puck.x<PR){ puck.x=PR; puck.vx*=-0.9; sfxWall(); }
    if (puck.x>W-PR){ puck.x=W-PR; puck.vx*=-0.9; sfxWall(); }
    // top/bottom: goal area or wall
    const inGoalX = puck.x>W/2-GOAL_W/2 && puck.x<W/2+GOAL_W/2;
    if (puck.y<PR) { if(inGoalX){ return goal('you'); } puck.y=PR; puck.vy*=-0.9; sfxWall(); }
    if (puck.y>H-PR) { if(inGoalX){ return goal('cpu'); } puck.y=H-PR; puck.vy*=-0.9; sfxWall(); }
    // clamp speed
    const sp2=Math.hypot(puck.vx,puck.vy); if(sp2>16){ puck.vx*=16/sp2; puck.vy*=16/sp2; }
    circleHit(puck, you, MR);
    circleHit(puck, cpu, MR);
  }

  function goal(who) {
    if (who==='you'){ youScore++; sfxGoal(); } else { cpuScore++; sfxConcede(); }
    if (youScore>=TARGET || cpuScore>=TARGET) return end();
    resetPuck(who==='you'?1:-1);
    you.x=W/2; you.y=H-70;
  }

  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function render() {
    ctx.fillStyle='#0f1f3a'; ctx.fillRect(0,0,W,H);
    // center line + circle
    ctx.strokeStyle='rgba(255,255,255,0.16)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2,H/2,60,0,Math.PI*2); ctx.stroke();
    // goals
    ctx.fillStyle='rgba(255,94,108,0.6)'; ctx.fillRect(W/2-GOAL_W/2,0,GOAL_W,8);
    ctx.fillStyle='rgba(46,230,160,0.6)'; ctx.fillRect(W/2-GOAL_W/2,H-8,GOAL_W,8);
    // score
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.font='bold 88px Space Mono, monospace'; ctx.textAlign='center';
    ctx.fillText(cpuScore, W/2, H/2-30);
    ctx.fillText(youScore, W/2, H/2+100);
    // mallets
    function mallet(m,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(m.x,m.y,MR,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(7,7,15,0.5)'; ctx.beginPath(); ctx.arc(m.x,m.y,MR*0.5,0,Math.PI*2); ctx.fill(); }
    mallet(cpu,'#ff5e6c'); mallet(you,'#2ee6a0');
    // puck
    ctx.fillStyle='#ffcb52'; ctx.beginPath(); ctx.arc(puck.x,puck.y,PR,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(7,7,15,0.3)'; ctx.beginPath(); ctx.arc(puck.x,puck.y,PR*0.6,0,Math.PI*2); ctx.fill();
  }
  function loop() { if(!playing) return; update(); if(!playing) return; render(); raf=requestAnimationFrame(loop); }

  function end() {
    playing=false; cancelAnimationFrame(raf); render();
    const win = youScore>cpuScore;
    const h=document.getElementById('ovTitle');
    h.textContent = win?'¡GANASTE!':'PERDISTE'; h.className=win?'win':'lose';
    document.getElementById('ovSub').textContent = `${youScore} a ${cpuScore}`;
    if (win){ const w=(parseInt(localStorage.getItem('hockeyWins')||'0',10)||0)+1; localStorage.setItem('hockeyWins',String(w)); }
    setTimeout(()=>overLayer.style.display='flex',500);
  }

  // controls — drag mallet (bottom half only)
  function movePointer(clientX, clientY) {
    const r=canvas.getBoundingClientRect();
    const x=(clientX-r.left)/r.width*W, y=(clientY-r.top)/r.height*H;
    you.px=you.x; you.py=you.y;
    you.x=Math.max(MR,Math.min(W-MR,x));
    you.y=Math.max(H/2+MR,Math.min(H-MR,y));
  }
  let dragging=false;
  canvas.addEventListener('pointerdown', e=>{ initAudio(); dragging=true; movePointer(e.clientX,e.clientY); });
  canvas.addEventListener('pointermove', e=>{ if(dragging&&playing) movePointer(e.clientX,e.clientY); });
  window.addEventListener('pointerup', ()=>dragging=false);

  document.getElementById('startBtn').addEventListener('click', ()=>{ initAudio(); reset(); });
  document.getElementById('againBtn').addEventListener('click', ()=>{ initAudio(); reset(); });
  const helpEl = document.getElementById('help');
  document.getElementById('helpBtn').addEventListener('click', ()=>helpEl.style.display='flex');
  document.getElementById('helpClose').addEventListener('click', ()=>{ helpEl.style.display='none'; localStorage.setItem('hockeySeenHelp','1'); });
  helpEl.addEventListener('click', e=>{ if(e.target===helpEl) helpEl.style.display='none'; });
  if (!localStorage.getItem('hockeySeenHelp')) helpEl.style.display='flex';
  document.addEventListener('gesturestart', e=>e.preventDefault());

  // initial paint
  you={x:W/2,y:H-70,px:W/2,py:H-70}; cpu={x:W/2,y:70}; youScore=0; cpuScore=0; resetPuck(1); render();
</script>
</body>
</html>
