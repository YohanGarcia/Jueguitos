<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🦘 saltarín</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  canvas {
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(255, 93, 138, 0.18);
    width: auto;
    height: auto;
    aspect-ratio: 480 / 760;
    max-width: calc(100vw - 32px);
    max-height: calc(100dvh - 32px);
    touch-action: none;
  }
  #ui {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    gap: 22px;
    background: rgba(255,255,255,0.06);
    padding: 8px 20px;
    border-radius: 30px;
    backdrop-filter: blur(8px);
    pointer-events: none;
    z-index: 2;
  }
  #ui span { color: #ff5d8a; white-space: nowrap; }
  .overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    text-align: center;
    z-index: 3;
    pointer-events: none;
    width: 100%;
    padding: 0 24px;
  }
  #startScreen h1 { font-size: 46px; letter-spacing: 2px; margin-bottom: 10px; }
  #startScreen .em { font-size: 60px; display: block; margin-bottom: 6px; animation: hop 1.1s ease-in-out infinite; }
  @keyframes hop { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-14px); } }
  #startScreen p { font-size: 16px; opacity: 0.55; line-height: 1.6; }
  #startScreen .go { margin-top: 18px; font-size: 15px; color: #ff5d8a; font-weight: 700; animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }
  #gameover { display: none; }
  #gameover h1 { font-size: 52px; margin-bottom: 4px; letter-spacing: 4px; }
  #gameover p { font-size: 17px; opacity: 0.5; }
  #gameover .final-score { font-size: 30px; color: #ff5d8a; margin-top: 8px; }
  #gameover .rank { font-size: 14px; opacity: 0.4; margin-top: 6px; }
  #restart {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 11px 30px;
    border: none;
    border-radius: 30px;
    background: #ff5d8a;
    color: #0a0a1a;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    z-index: 4;
    transition: transform 0.15s;
  }
  #restart:hover { transform: translateX(-50%) scale(1.05); }
  #menuLink {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 8px 18px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 5;
    text-decoration: none;
    transition: background 0.15s;
  }
  #menuLink:hover { background: rgba(255,255,255,0.18); }
  #controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    z-index: 1;
    pointer-events: none;
  }
  @media (hover: none) and (pointer: coarse) { #controls { display: none; } }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="ui">🏆 <span id="score">0</span> <span style="opacity:0.3">·</span> mejor <span id="best">0</span></div>

<div id="startScreen" class="overlay">
  <span class="em">🦘</span>
  <h1>SALTARÍN</h1>
  <p>Subí saltando de plataforma en plataforma.<br>Agarrá 🚀 y 🛡, disparale a los bichos.</p>
  <div class="go">► tocá o flecha para empezar</div>
</div>

<div id="gameover" class="overlay">
  <h1>¡PLOF!</h1>
  <p id="go-sub"></p>
  <div class="final-score" id="go-score">0</div>
  <div class="rank" id="go-rank"></div>
</div>

<button id="restart">↻ jugar de nuevo</button>
<a id="menuLink" href="index.html">← menú</a>
<div id="controls">← → mover · espacio/clic disparar · pisá o disparale a los bichos</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startScreen = document.getElementById('startScreen');
  const gameoverEl = document.getElementById('gameover');
  const goSub = document.getElementById('go-sub');
  const goScore = document.getElementById('go-score');
  const goRank = document.getElementById('go-rank');
  const restartBtn = document.getElementById('restart');

  const W = 480, H = 760;
  canvas.width = W; canvas.height = H;

  // physics
  const GRAV = 0.34;
  const JUMP = -12.6;
  const SPRING = -21.5;
  const MOVE = 5.4;
  const SCROLL = H * 0.42;
  const PR = 17;            // player radius
  const PW = 34;            // player half-width for collisions
  const PLAT_W = 72, PLAT_H = 15;

  const TYPE = { NORMAL: 0, MOVING: 1, BREAK: 2 };

  let state = 'start';      // start | play | over
  let player, platforms, particles, stars;
  let score, best, scrolled, topY;
  let keyL = false, keyR = false, touchDir = 0, tiltVx = 0;
  let enemies, bullets;
  let jetTimer = 0, shieldTimer = 0, shootCD = 0, frame = 0;
  let tapT = 0, tapX = 0, tapY = 0, tapMoved = false;

  // ---------- audio ----------
  let actx;
  function initAudio() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function tone(f, d, t = 'square', v = 0.05, slideTo = null) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = t; o.frequency.setValueAtTime(f, actx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + d);
    g.gain.setValueAtTime(v, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + d);
  }
  function note(f, s, d, t = 'square', v = 0.05) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = t; o.frequency.value = f;
    g.gain.setValueAtTime(v, s);
    g.gain.exponentialRampToValueAtTime(0.001, s + d);
    o.connect(g); g.connect(actx.destination);
    o.start(s); o.stop(s + d);
  }
  const sfxJump = () => tone(420, 0.12, 'square', 0.04, 620);
  const sfxSpring = () => { tone(300, 0.28, 'square', 0.06, 1200); };
  const sfxBreak = () => tone(180, 0.18, 'sawtooth', 0.05, 70);
  function sfxDeath() {
    if (!actx) return;
    [440, 360, 280, 200, 140].forEach((f, i) => note(f, actx.currentTime + i * 0.09, 0.16, 'sawtooth', 0.05));
  }
  const sfxShoot = () => tone(900, 0.09, 'square', 0.03, 1500);
  const sfxEnemyDie = () => tone(520, 0.12, 'square', 0.05, 120);
  const sfxStomp = () => tone(240, 0.12, 'square', 0.06, 540);
  const sfxJet = () => { if (actx) [330, 440, 550, 660].forEach((f, i) => note(f, actx.currentTime + i * 0.06, 0.1, 'sawtooth', 0.05)); };
  const sfxPower = () => { if (actx) [660, 880].forEach((f, i) => note(f, actx.currentTime + i * 0.08, 0.12, 'triangle', 0.06)); };

  function rand(a, b) { return Math.random() * (b - a) + a; }

  // ---------- world ----------
  function makePlatform(y, forceNormal) {
    const diff = Math.min(1, scrolled / 9000);
    let type = TYPE.NORMAL;
    if (!forceNormal) {
      const r = Math.random();
      if (r < 0.12 + diff * 0.16) type = TYPE.MOVING;
      else if (r < 0.20 + diff * 0.26) type = TYPE.BREAK;
    }
    const w = PLAT_W;
    const p = {
      x: rand(8, W - w - 8), y, w, h: PLAT_H, type,
      vx: type === TYPE.MOVING ? rand(1.1, 2.0) * (Math.random() < 0.5 ? -1 : 1) : 0,
      spring: false, dead: false, crumble: 0
    };
    // springs only on solid platforms, rarer as you climb
    if (type !== TYPE.BREAK && Math.random() < 0.10 - diff * 0.04) p.spring = true;
    // power-ups (after a warm-up): jetpack or shield, on solid non-spring platforms
    p.power = null;
    if (!p.spring && type !== TYPE.BREAK && scrolled > 500) {
      const pr = Math.random();
      if (pr < 0.016) p.power = 'jet';
      else if (pr < 0.046) p.power = 'shield';
    }
    return p;
  }

  function maybeSpawnEnemy(y) {
    if (scrolled < 700) return;
    const diff = Math.min(1, scrolled / 9000);
    if (Math.random() < 0.05 + diff * 0.11) {
      const ufo = Math.random() < 0.5;
      const w = ufo ? 48 : 38, h = ufo ? 26 : 34;
      enemies.push({
        x: rand(10, W - w - 10), y: y - h - rand(6, 28), w, h,
        type: ufo ? 'ufo' : 'blob',
        vx: ufo ? rand(0.9, 1.9) * (Math.random() < 0.5 ? -1 : 1) : rand(-0.5, 0.5),
        bob: rand(0, Math.PI * 2), alive: true
      });
    }
  }

  function ensurePlatforms() {
    while (topY > -30) {
      const diff = Math.min(1, scrolled / 9000);
      const gap = rand(58 + diff * 30, 92 + diff * 48);
      topY -= gap;
      const np = makePlatform(topY, false);
      platforms.push(np);
      if (np.type !== TYPE.BREAK && !np.power) maybeSpawnEnemy(topY);
    }
    for (let i = platforms.length - 1; i >= 0; i--) {
      if (platforms[i].y > H + 40) platforms.splice(i, 1);
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
      if (!enemies[i].alive || enemies[i].y > H + 60) enemies.splice(i, 1);
    }
  }

  function shoot() {
    if (state !== 'play' || shootCD > 0) return;
    bullets.push({ x: player.x, y: player.y - PR, vy: -13 });
    shootCD = 11;
    player.shootFlash = 6;
    sfxShoot();
  }

  function reset() {
    initAudio();
    player = { x: W / 2, y: H - 120, vx: 0, vy: JUMP, squash: 0, shootFlash: 0, grace: 0 };
    platforms = [];
    particles = [];
    enemies = [];
    bullets = [];
    jetTimer = 0; shieldTimer = 0; shootCD = 0;
    score = 0; scrolled = 0;
    best = parseInt(localStorage.getItem('saltarinBest') || '0', 10);
    bestEl.textContent = best;
    scoreEl.textContent = 0;
    // starting platform right under the player + a spread upward
    platforms.push({ x: W / 2 - PLAT_W / 2, y: H - 70, w: PLAT_W, h: PLAT_H, type: TYPE.NORMAL, vx: 0, spring: false, dead: false, crumble: 0 });
    topY = H - 70;
    while (topY > -30) {
      const gap = rand(60, 88);
      topY -= gap;
      platforms.push(makePlatform(topY, topY > H - 240));
    }
    gameoverEl.style.display = 'none';
    startScreen.style.display = 'none';
    restartBtn.style.display = 'none';
    state = 'play';
  }

  function endGame(reason) {
    if (state === 'over') return;
    state = 'over';
    sfxDeath();
    if (score > best) { best = score; localStorage.setItem('saltarinBest', best.toString()); }
    bestEl.textContent = best;
    document.querySelector('#gameover h1').textContent = reason === 'enemy' ? '¡TE ATRAPARON!' : '¡PLOF!';
    goScore.textContent = `🏆 ${score} m`;
    goSub.textContent = `récord: ${best} m`;
    const ranks = ['saltarín novato', 'rana saltarina', 'canguro', 'cabra montés', 'astronauta', 'leyenda lunar'];
    goRank.textContent = `rango: ${ranks[Math.min(5, Math.floor(score / 250))]}`;
    gameoverEl.style.display = 'block';
    restartBtn.style.display = 'block';
  }

  function burst(x, y, color, n, spread) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, Math.PI * 2), sp = rand(1, spread);
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 1, decay: rand(0.025, 0.05), size: rand(2, 5), color });
    }
  }

  // ---------- input ----------
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyL = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyR = true;
    if (state === 'play' && (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W')) { shoot(); e.preventDefault(); }
    else if (state !== 'play' && (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Enter' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd')) {
      initAudio(); reset(); e.preventDefault();
    }
    if (e.key === 'Escape') window.location.href = 'index.html';
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyL = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyR = false;
  });
  document.addEventListener('click', initAudio, { once: true });
  canvas.addEventListener('mousedown', () => { initAudio(); if (state === 'play') shoot(); else reset(); });
  restartBtn.addEventListener('click', () => { initAudio(); reset(); });

  // Touch: hold left/right half to move; tap starts
  function touchUpdate(e) {
    touchDir = 0;
    for (const t of e.touches) {
      const rect = canvas.getBoundingClientRect();
      const x = t.clientX - rect.left;
      if (x < rect.width / 2) touchDir = -1; else touchDir = 1;
    }
  }
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    initAudio();
    if (state !== 'play') { reset(); return; }
    const t = e.touches[0];
    tapT = Date.now(); tapX = t.clientX; tapY = t.clientY; tapMoved = false;
    touchUpdate(e);
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    if (t && (Math.abs(t.clientX - tapX) > 12 || Math.abs(t.clientY - tapY) > 12)) tapMoved = true;
    touchUpdate(e);
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (state === 'play' && !tapMoved && Date.now() - tapT < 200) shoot();
    if (e.touches.length === 0) touchDir = 0; else touchUpdate(e);
  }, { passive: false });
  // also let taps anywhere start
  document.addEventListener('touchstart', () => { if (state !== 'play') { initAudio(); reset(); } }, { passive: true });

  // Optional device tilt
  window.addEventListener('deviceorientation', e => {
    if (e.gamma == null) return;
    tiltVx = Math.max(-1, Math.min(1, e.gamma / 25));
  });

  // ---------- update ----------
  function update() {
    if (state !== 'play') return;
    frame++;
    if (shootCD > 0) shootCD--;
    if (shieldTimer > 0) shieldTimer--;
    if (player.grace > 0) player.grace--;
    if (player.shootFlash > 0) player.shootFlash--;

    // horizontal intent
    let dir = 0;
    if (keyL) dir -= 1;
    if (keyR) dir += 1;
    if (touchDir) dir = touchDir;
    if (!dir && Math.abs(tiltVx) > 0.12) dir = tiltVx;
    const target = dir * MOVE;
    player.vx += (target - player.vx) * 0.35;

    player.x += player.vx;
    if (player.x < -PW) player.x = W + PW;
    if (player.x > W + PW) player.x = -PW;

    const prevFeet = player.y + PR;
    if (jetTimer > 0) {
      jetTimer--;
      player.vy = -15;
      if (frame % 2 === 0) particles.push({ x: player.x + rand(-6, 6), y: player.y + PR, vx: rand(-1, 1), vy: rand(2, 4), life: 1, decay: 0.05, size: rand(3, 6), color: frame % 4 < 2 ? '#ffd23e' : '#ff7a3e' });
    } else {
      player.vy += GRAV;
    }
    player.y += player.vy;
    if (player.squash > 0) player.squash *= 0.8;

    // moving platforms
    for (const p of platforms) {
      if (p.type === TYPE.MOVING && !p.dead) {
        p.x += p.vx;
        if (p.x < 6 || p.x + p.w > W - 6) p.vx *= -1;
      }
      if (p.crumble > 0) { p.crumble += 1; p.y += 2 + p.crumble * 0.4; }
    }

    // collisions (only while falling)
    if (player.vy > 0) {
      const feet = player.y + PR;
      for (const p of platforms) {
        if (p.dead || p.crumble > 0) continue;
        if (player.x + PW * 0.6 > p.x && player.x - PW * 0.6 < p.x + p.w &&
            prevFeet <= p.y + 6 && feet >= p.y && feet <= p.y + p.h + 12) {
          if (p.type === TYPE.BREAK) {
            p.crumble = 1;
            sfxBreak();
            burst(player.x, p.y, '#ff7a7a', 10, 4);
            continue; // no bounce — you fall through
          }
          player.y = p.y - PR;
          player.grace = 8;
          if (p.spring) {
            player.vy = SPRING;
            player.squash = 1.4;
            sfxSpring();
            burst(player.x, p.y, '#ffd23e', 16, 6);
          } else {
            player.vy = JUMP;
            player.squash = 1;
            sfxJump();
            burst(player.x, p.y + p.h, '#ff5d8a', 5, 3);
          }
          if (p.power === 'jet') { jetTimer = 95; sfxJet(); burst(player.x, p.y, '#ffd23e', 22, 7); p.power = null; }
          else if (p.power === 'shield') { shieldTimer = 460; sfxPower(); burst(player.x, p.y, '#5be0ff', 22, 7); p.power = null; }
          break;
        }
      }
    }

    // bullets travel up and pop enemies
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.y += b.vy;
      let hit = false;
      for (const e of enemies) {
        if (e.alive && b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
          e.alive = false; hit = true;
          burst(e.x + e.w / 2, e.y + e.h / 2, '#5be0ff', 16, 6);
          sfxEnemyDie();
          break;
        }
      }
      if (hit || b.y < -20) bullets.splice(i, 1);
    }

    // enemies drift + contact with player
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive) { enemies.splice(i, 1); continue; }
      e.bob += 0.05;
      e.x += e.vx;
      if (e.x < 6 || e.x + e.w > W - 6) e.vx *= -1;
      if (player.grace <= 0 &&
          player.x + PW * 0.5 > e.x && player.x - PW * 0.5 < e.x + e.w &&
          player.y + PR > e.y + 4 && player.y - PR < e.y + e.h - 4) {
        if (shieldTimer > 0 || jetTimer > 0) {
          e.alive = false;
          burst(e.x + e.w / 2, e.y + e.h / 2, '#5be0ff', 16, 6);
          sfxEnemyDie();
        } else if (player.vy > 0 && prevFeet <= e.y + e.h * 0.5) {
          e.alive = false;
          burst(e.x + e.w / 2, e.y + e.h / 2, '#ff5d8a', 16, 6);
          sfxStomp();
          player.vy = JUMP * 1.05;
          player.squash = 1.1;
          player.grace = 6;
        } else {
          endGame('enemy');
          return;
        }
      }
    }

    // scroll the world down as the player climbs
    if (player.y < SCROLL) {
      const d = SCROLL - player.y;
      player.y = SCROLL;
      scrolled += d;
      topY += d;
      for (const p of platforms) p.y += d;
      for (const pt of particles) pt.y += d;
      for (const e of enemies) e.y += d;
      for (const b of bullets) b.y += d;
      score = Math.floor(scrolled / 10);
      scoreEl.textContent = score;
    }

    ensurePlatforms();

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.14; pt.life -= pt.decay;
      if (pt.life <= 0) particles.splice(i, 1);
    }

    // death
    if (player.y - PR > H) endGame();
  }

  // ---------- draw ----------
  function initStars() {
    stars = Array.from({ length: 46 }, () => ({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), t: rand(0, Math.PI * 2) }));
  }

  function drawPlatform(p) {
    const op = p.crumble > 0 ? Math.max(0, 1 - p.crumble * 0.06) : 1;
    ctx.globalAlpha = op;
    let c1, c2;
    if (p.type === TYPE.MOVING) { c1 = '#7cc6ff'; c2 = '#2a78d6'; }
    else if (p.type === TYPE.BREAK) { c1 = '#ff9b9b'; c2 = '#c93f3f'; }
    else { c1 = '#62e6b0'; c2 = '#1f9e6e'; }
    const g = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
    g.addColorStop(0, c1); g.addColorStop(1, c2);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 7); ctx.fill();
    // top sheen
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(p.x + 4, p.y + 2, p.w - 8, 3, 2); ctx.fill();
    if (p.type === TYPE.BREAK) {
      ctx.strokeStyle = 'rgba(80,0,0,0.4)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.x + p.w * 0.5, p.y); ctx.lineTo(p.x + p.w * 0.42, p.y + p.h);
      ctx.moveTo(p.x + p.w * 0.7, p.y); ctx.lineTo(p.x + p.w * 0.78, p.y + p.h);
      ctx.stroke();
    }
    if (p.spring) {
      const sx = p.x + p.w / 2, sy = p.y;
      ctx.strokeStyle = '#ffd23e'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx - 6, sy);
      ctx.lineTo(sx - 6, sy - 7); ctx.lineTo(sx + 6, sy - 11); ctx.lineTo(sx - 6, sy - 15); ctx.lineTo(sx + 6, sy - 18);
      ctx.stroke();
      ctx.fillStyle = '#ffe27a';
      ctx.beginPath(); ctx.roundRect(sx - 9, sy - 22, 18, 5, 2); ctx.fill();
    }
    if (p.power) {
      const ix = p.x + p.w / 2, iy = p.y - 14;
      if (p.power === 'jet') {
        ctx.font = '17px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🚀', ix, iy);
      } else {
        ctx.shadowBlur = 8; ctx.shadowColor = '#5be0ff';
        ctx.fillStyle = 'rgba(91,224,255,0.25)';
        ctx.beginPath(); ctx.arc(ix, iy, 8, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#5be0ff'; ctx.lineWidth = 2.2;
        ctx.beginPath(); ctx.arc(ix, iy, 8, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawEnemy(e) {
    const cx = e.x + e.w / 2, cy = e.y + e.h / 2 + Math.sin(e.bob) * 3;
    if (e.type === 'ufo') {
      ctx.save();
      ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(91,224,255,0.6)';
      ctx.fillStyle = 'rgba(190,240,255,0.9)';
      ctx.beginPath(); ctx.ellipse(cx, cy - 3, e.w * 0.26, e.h * 0.42, 0, Math.PI, 0); ctx.fill();
      const g = ctx.createLinearGradient(0, cy - 4, 0, cy + 8);
      g.addColorStop(0, '#7fe3ff'); g.addColorStop(1, '#1f7fae');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(cx, cy + 2, e.w * 0.5, e.h * 0.32, 0, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffe27a';
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(cx + i * 12, cy + 4, 2.2, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
    } else {
      ctx.save();
      ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(160,90,255,0.6)';
      ctx.fillStyle = '#8b5cff';
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * e.w * 0.44, cy + Math.sin(a) * e.w * 0.44);
        ctx.lineTo(cx + Math.cos(a + 0.12) * e.w * 0.68, cy + Math.sin(a + 0.12) * e.w * 0.68);
        ctx.lineTo(cx + Math.cos(a + 0.34) * e.w * 0.44, cy + Math.sin(a + 0.34) * e.w * 0.44);
        ctx.fill();
      }
      const g = ctx.createRadialGradient(cx - 4, cy - 5, 2, cx, cy, e.w * 0.6);
      g.addColorStop(0, '#c79bff'); g.addColorStop(0.6, '#8b5cff'); g.addColorStop(1, '#5a2ec9');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(cx, cy, e.w * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 6, cy - 1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 6, cy - 1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1a0510';
      ctx.beginPath(); ctx.arc(cx - 5, cy, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 7, cy, 2, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#1a0510'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx, cy + 7, 4, 1.15 * Math.PI, 1.85 * Math.PI); ctx.stroke();
      ctx.restore();
    }
  }

  function drawPlayer() {
    const sq = player.squash;
    const sx = 1 - sq * 0.32, sy = 1 + sq * 0.34;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.scale(sx, sy);
    // glow body
    const g = ctx.createRadialGradient(-5, -6, 2, 0, 0, PR + 3);
    g.addColorStop(0, '#ffaec6'); g.addColorStop(0.6, '#ff5d8a'); g.addColorStop(1, '#d62e63');
    ctx.shadowBlur = 16; ctx.shadowColor = 'rgba(255,93,138,0.6)';
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, PR, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // ears
    ctx.fillStyle = '#ff5d8a';
    ctx.beginPath(); ctx.ellipse(-7, -PR + 2, 4, 8, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7, -PR + 2, 4, 8, 0.3, 0, Math.PI * 2); ctx.fill();
    // eyes
    const look = Math.max(-3, Math.min(3, player.vx));
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6, -2, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -2, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a0510';
    ctx.beginPath(); ctx.arc(-6 + look, -1, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6 + look, -1, 2.4, 0, Math.PI * 2); ctx.fill();
    // smile
    ctx.strokeStyle = '#1a0510'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, 5, 4.5, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
    ctx.restore();
  }

  function draw() {
    // background gradient shifts with height
    const t = Math.min(1, scrolled / 12000);
    const top = `hsl(${250 - t * 40}, 45%, ${9 + t * 4}%)`;
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, top);
    bg.addColorStop(1, '#0a0a1a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // stars twinkle
    for (const s of stars) {
      s.t += 0.04;
      ctx.fillStyle = `rgba(255,255,255,${0.18 + Math.sin(s.t) * 0.14})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }

    for (const p of platforms) drawPlatform(p);

    if (enemies) for (const e of enemies) drawEnemy(e);

    if (bullets) for (const b of bullets) {
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff5d8a';
      ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    for (const pt of particles) {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size * pt.life, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (state !== 'start') {
      drawPlayer();
      if (shieldTimer > 0) {
        const a = shieldTimer < 90 ? (Math.sin(frame * 0.4) * 0.3 + 0.45) : 0.55;
        ctx.strokeStyle = `rgba(91,224,255,${a})`;
        ctx.lineWidth = 2.5;
        ctx.shadowBlur = 12; ctx.shadowColor = '#5be0ff';
        ctx.beginPath(); ctx.arc(player.x, player.y, PR + 8, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    if (state === 'play') {
      let hy = 66;
      if (jetTimer > 0) { drawTimerChip(14, hy, '🚀', jetTimer / 95, '#ffd23e'); hy += 22; }
      if (shieldTimer > 0) { drawTimerChip(14, hy, '🛡', shieldTimer / 460, '#5be0ff'); }
    }
  }

  function drawTimerChip(x, y, icon, frac, color) {
    ctx.font = '14px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff'; ctx.fillText(icon, x, y);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(x + 22, y - 4, 58, 7, 3); ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.roundRect(x + 22, y - 4, 58 * Math.max(0, frac), 7, 3); ctx.fill();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // boot
  best = parseInt(localStorage.getItem('saltarinBest') || '0', 10);
  bestEl.textContent = best;
  initStars();
  // idle preview platforms behind start screen
  platforms = [];
  particles = [];
  enemies = [];
  bullets = [];
  scrolled = 0; score = 0; topY = H;
  for (let i = 0; i < 9; i++) { topY -= rand(70, 95); platforms.push(makePlatform(topY, true)); }
  player = { x: W / 2, y: H + 200, vx: 0, vy: 0, squash: 0, shootFlash: 0, grace: 0 };
  loop();
</script>
</body>
