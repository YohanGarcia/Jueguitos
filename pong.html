<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  canvas {
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(0, 255, 200, 0.1);
    width: 1000px;
    height: 600px;
    max-width: 98vw;
    max-height: 90vh;
  }
  #ui {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    gap: 40px;
    background: rgba(255,255,255,0.06);
    padding: 8px 28px;
    border-radius: 30px;
    backdrop-filter: blur(8px);
    pointer-events: none;
    z-index: 2;
  }
  #ui .score { color: #0f8; font-size: 22px; min-width: 30px; display: inline-block; text-align: center; }
  #ui .score.opponent { color: #f80; }
  #gameover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    text-align: center;
    display: none;
    z-index: 3;
    pointer-events: none;
  }
  #gameover h1 { font-size: 52px; margin-bottom: 4px; letter-spacing: 4px; }
  #gameover p { font-size: 18px; opacity: 0.5; }
  #restart {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 28px;
    border: none;
    border-radius: 30px;
    background: #0f8;
    color: #0a0a1a;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    z-index: 3;
    transition: transform 0.15s;
  }
  #restart:hover { transform: translateX(-50%) scale(1.05); }
  #menuLink {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 8px 18px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 5;
    text-decoration: none;
    transition: background 0.15s;
  }
  #menuLink:hover { background: rgba(255,255,255,0.18); }
  #controls-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.15);
    font-size: 13px;
    z-index: 1;
    pointer-events: none;
  }
</style>
</head>
<body>

<a id="menuLink" href="index.html">← volver</a>
<div id="ui">
  <span>vos <span class="score" id="playerScore">0</span></span>
  <span style="opacity:0.2;font-size:13px;letter-spacing:4px;">VS</span>
  <span><span class="score opponent" id="aiScore">0</span> IA</span>
</div>
<canvas id="c" width="1000" height="600"></canvas>
<div id="gameover">
  <h1 id="winner">GANASTE</h1>
  <p id="subtext">✨ imbatible ✨</p>
</div>
<button id="restart">🔄 jugar de nuevo</button>
<div id="controls-hint">W / S · ↑ / ↓ — mover paleta · Espacio — empezar</div>
<div id="touchHint" style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.1);font-size:12px;z-index:1;pointer-events:none;display:none;">tocá la pantalla para mover la paleta</div>
<style>@media (hover:none) and (pointer:coarse){#controls-hint{display:none}#touchHint{display:block!important}}</style>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 1000, H = 600;
const PAD_W = 14, PAD_H = 100, BALL_R = 10;
const SPEED = 5, PAD_SPEED = 6;
const WIN_SCORE = 7;

let playerY, aiY, ballX, ballY, ballVx, ballVy, playerScore, aiScore;
let running, gameOver, animId, serving;

// Visual effects
let particles = [];
let ballTrail = [];
let flashAlpha = 0;
let stars = Array.from({length: 80}, () => ({
  x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.2 + 0.3, s: Math.random() * 0.3 + 0.1
}));

function addParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * 2 * Math.PI;
    const speed = Math.random() * 4 + 2;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: Math.random() * 0.03 + 0.015, r: Math.random() * 3 + 2, color
    });
  }
}

// Audio
let actx;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type = 'square', vol = 0.07) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, actx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  osc.connect(gain); gain.connect(actx.destination);
  osc.start(); osc.stop(actx.currentTime + dur);
}
function playNote(freq, start, dur, type = 'square', vol = 0.07) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, start);
  gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
  osc.connect(gain); gain.connect(actx.destination);
  osc.start(start); osc.stop(start + dur);
}
function sfxPaddle() { playTone(350, 0.08, 'square', 0.05); }
function sfxWall() { playTone(250, 0.06, 'triangle', 0.04); }
function sfxScore() { playTone(220, 0.2, 'square', 0.06); }
function sfxWin() {
  if (!actx) return;
  const t = actx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => playNote(f, t + i * 0.12, 0.15, 'square', 0.07));
}
function sfxLose() {
  if (!actx) return;
  const t = actx.currentTime;
  [392, 349, 294, 220].forEach((f, i) => playNote(f, t + i * 0.15, 0.18, 'sawtooth', 0.05));
}

function reset() {
  playerY = H / 2 - PAD_H / 2;
  aiY = H / 2 - PAD_H / 2;
  ballX = W / 2;
  ballY = H / 2;
  const angle = (Math.random() * 0.8 - 0.4) * Math.PI / 3;
  const dir = Math.random() < 0.5 ? 1 : -1;
  ballVx = dir * SPEED * Math.cos(angle);
  ballVy = SPEED * Math.sin(angle);
  ballTrail = [];
  particles = [];
  flashAlpha = 0;
  serving = true;
  setTimeout(() => { serving = false; }, 600);
}

function startGame() {
  if (animId) cancelAnimationFrame(animId);
  initAudio();
  playerScore = 0; aiScore = 0; gameOver = false; running = true;
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('restart').style.display = 'none';
  updateUI();
  reset();
  animId = requestAnimationFrame(loop);
}

function updateUI() {
  document.getElementById('playerScore').textContent = playerScore;
  document.getElementById('aiScore').textContent = aiScore;
}

function loop() {
  if (!gameOver && running) update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  if (!gameOver && running) {
    // player
    if (keys['w'] || keys['W'] || keys['ArrowUp']) playerY -= PAD_SPEED;
    if (keys['s'] || keys['S'] || keys['ArrowDown']) playerY += PAD_SPEED;
    playerY = Math.max(0, Math.min(H - PAD_H, playerY));

    // AI — misma velocidad que el player, con error aleatorio
    const aiCenter = aiY + PAD_H / 2;
    let targetY = ballY + (Math.random() - 0.5) * 60;
    if (ballVx < 0 && !serving) {
      targetY = H / 2 + (Math.random() - 0.5) * 20;
    }
    const diff = targetY - aiCenter;
    if (Math.abs(diff) > 8) {
      aiY += Math.sign(diff) * Math.min(PAD_SPEED, Math.abs(diff));
    }
    aiY = Math.max(0, Math.min(H - PAD_H, aiY));
  }

  // Ball
  if (!serving) {
    ballX += ballVx;
    ballY += ballVy;
    ballTrail.push({x: ballX, y: ballY});
    if (ballTrail.length > 10) ballTrail.shift();

    // update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.life -= p.life > 0.1 ? 0.025 : 0.06;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // wall bounce
    if (ballY - BALL_R <= 0) { ballY = BALL_R; ballVy = Math.abs(ballVy); addParticles(ballX, 0, '#555', 4); sfxWall(); }
    if (ballY + BALL_R >= H) { ballY = H - BALL_R; ballVy = -Math.abs(ballVy); addParticles(ballX, H, '#555', 4); sfxWall(); }

    // player paddle
    if (ballVx < 0 && ballX - BALL_R <= PAD_W &&
        ballY + BALL_R >= playerY && ballY - BALL_R <= playerY + PAD_H) {
      ballX = PAD_W + BALL_R;
      const hit = (ballY - playerY) / PAD_H - 0.5;
      const angle = hit * Math.PI / 3;
      const speed = Math.hypot(ballVx, ballVy) + 0.3;
      ballVx = speed * Math.cos(angle);
      ballVy = speed * Math.sin(angle);
      addParticles(ballX, ballY, '#0cf', 8);
      sfxPaddle();
    }

    // AI paddle
    if (ballVx > 0 && ballX + BALL_R >= W - PAD_W &&
        ballY + BALL_R >= aiY && ballY - BALL_R <= aiY + PAD_H) {
      ballX = W - PAD_W - BALL_R;
      const hit = (ballY - aiY) / PAD_H - 0.5;
      const angle = hit * Math.PI / 3;
      const speed = Math.hypot(ballVx, ballVy) + 0.3;
      ballVx = -speed * Math.cos(angle);
      ballVy = speed * Math.sin(angle);
      addParticles(ballX, ballY, '#f80', 8);
      sfxPaddle();
    }

    // scoring
    if (ballX - BALL_R <= -20) {
      aiScore++;
      flashAlpha = 0.4;
      addParticles(W - 100, H / 2, '#f80', 25);
      sfxScore();
      checkWin();
      if (!gameOver) reset();
    }
    if (ballX + BALL_R >= W + 20) {
      playerScore++;
      flashAlpha = 0.4;
      addParticles(100, H / 2, '#0cf', 25);
      sfxScore();
      checkWin();
      if (!gameOver) reset();
    }
  }
}

function checkWin() {
  updateUI();
  if (playerScore >= WIN_SCORE) {
    gameOver = true;
    const w = parseInt(localStorage.getItem('pongWins') || '0', 10) + 1;
    localStorage.setItem('pongWins', w.toString());
    document.getElementById('winner').textContent = '🎉 GANASTE';
    document.getElementById('subtext').textContent = `✨ victoria #${w} · imbatible ✨`;
    document.getElementById('gameover').style.display = 'block';
    document.getElementById('restart').style.display = 'block';
    sfxWin();
  } else if (aiScore >= WIN_SCORE) {
    gameOver = true;
    document.getElementById('winner').textContent = '😵 PERDISTE';
    document.getElementById('subtext').textContent = 'la IA te domina';
    document.getElementById('gameover').style.display = 'block';
    document.getElementById('restart').style.display = 'block';
    sfxLose();
  }
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // stars
  stars.forEach(s => {
    s.y += s.s;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(s.y * 0.01) * 0.2})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });

  // ball trail
  for (let i = 0; i < ballTrail.length; i++) {
    const t = ballTrail[i];
    const alpha = (i / ballTrail.length) * 0.3;
    ctx.fillStyle = `rgba(0,255,180,${alpha})`;
    ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * (0.3 + 0.7 * i / ballTrail.length), 0, Math.PI * 2); ctx.fill();
  }

  // center line
  ctx.setLineDash([10, 16]);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.setLineDash([]);

  // paddles
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 25;
  ctx.shadowColor = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, playerY, PAD_W, PAD_H);
  ctx.fillRect(W - PAD_W, aiY, PAD_W, PAD_H);

  // paddle glow accents
  const grad1 = ctx.createLinearGradient(0, playerY, PAD_W, playerY);
  grad1.addColorStop(0, '#0cf'); grad1.addColorStop(1, 'rgba(0,204,255,0)');
  ctx.fillStyle = grad1; ctx.fillRect(0, playerY, PAD_W, PAD_H);
  const grad2 = ctx.createLinearGradient(W, aiY, W - PAD_W, aiY);
  grad2.addColorStop(0, '#f80'); grad2.addColorStop(1, 'rgba(255,136,0,0)');
  ctx.fillStyle = grad2; ctx.fillRect(W - PAD_W, aiY, PAD_W, PAD_H);

  // ball
  ctx.shadowBlur = 40;
  ctx.shadowColor = 'rgba(0, 255, 180, 0.6)';
  ctx.beginPath();
  ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#0f8';
  ctx.fill();
  // ball inner glow
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();

  ctx.shadowBlur = 0;

  // particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // scores on canvas
  ctx.font = 'bold 72px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillText(playerScore, W * 0.25, 100);
  ctx.fillText(aiScore, W * 0.75, 100);

  // score flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
    flashAlpha -= 0.02;
  }

  if (serving) {
    ctx.font = '18px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.textAlign = 'center';
    ctx.fillText('presioná ESPACIO para sacar', W / 2, H / 2 + 50);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
  }
}

// input
const keys = {};
document.addEventListener('keydown', e => {
  initAudio();
  keys[e.key] = true;
  if (e.key === ' ' && serving) { serving = false; }
  if (e.key === ' ' && !running) startGame();
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('restart').addEventListener('click', startGame);
document.addEventListener('click', initAudio, { once: true });

// Touch controls — paddle follows finger Y
let touchId = null;
canvas.addEventListener('touchstart', e => {
  initAudio();
  if (e.touches.length > 0) {
    const t = e.touches[0];
    touchId = t.identifier;
  }
  if (serving) serving = false;
  if (gameOver) startGame();
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (!running) return;
  for (const t of e.changedTouches) {
    if (t.identifier === touchId || touchId === null) {
      touchId = t.identifier;
      const rect = canvas.getBoundingClientRect();
      const scaleY = H / rect.height;
      playerY = (t.clientY - rect.top) * scaleY - PAD_H / 2;
      playerY = Math.max(0, Math.min(H - PAD_H, playerY));
    }
  }
}, { passive: true });
canvas.addEventListener('touchend', e => { touchId = null; }, { passive: true });

startGame();
</script>
</body>
</html>
