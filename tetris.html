<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧱 tetris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  #wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  canvas#board {
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0, 200, 255, 0.12);
    width: auto;
    height: auto;
    aspect-ratio: 500 / 650;
    max-width: min(60vw, 500px);
    max-height: calc(100dvh - 32px);
  }
  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 140px;
  }
  .panel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    color: #fff;
  }
  .panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
    margin-bottom: 6px;
  }
  .panel .value {
    font-size: 22px;
    font-weight: 700;
    color: #0cf;
  }
  .panel .value.lines { color: #fc0; }
  .panel .value.level { color: #0f8; }
  #nextCanvas {
    border-radius: 8px;
    width: 100%;
    aspect-ratio: 1;
  }
  #gameover {
    display: none;
    text-align: center;
    color: #fff;
  }
  #gameover h1 {
    font-size: 36px;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }
  #gameover p { font-size: 14px; opacity: 0.5; }
  #restart {
    padding: 10px 28px;
    border: none;
    border-radius: 30px;
    background: #0cf;
    color: #0a0a1a;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
    margin-top: 8px;
  }
  #restart:hover { transform: scale(1.05); }
  #controls {
    color: rgba(255,255,255,0.2);
    font-size: 12px;
    line-height: 1.7;
    margin-top: 4px;
  }
  #controls span { color: rgba(255,255,255,0.4); }
  #menuLink {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 8px 18px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 5;
    text-decoration: none;
    transition: background 0.15s;
  }
  #menuLink:hover { background: rgba(255,255,255,0.18); }
  #touchControls {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 20;
    gap: 6px;
    touch-action: none;
  }
  #touchControls .row { display: flex; justify-content: center; gap: 6px; }
  #touchControls button {
    width: 58px; height: 58px;
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  #touchControls button:active { background: rgba(255,255,255,0.25); }
  #touchControls .wide { width: 80px; font-size: 14px; background: rgba(0,204,255,0.15); }
  @media (hover: none) and (pointer: coarse) {
    #touchControls { display: flex; flex-direction: column; align-items: center; }
    #sidebar { display: none; }
    canvas#board { max-width: calc(100vw - 24px); max-height: 65dvh; }
    #mobileUI { display: flex !important; }
  }
  #mobileUI {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    gap: 18px;
    background: rgba(255,255,255,0.06);
    padding: 6px 16px;
    border-radius: 24px;
    backdrop-filter: blur(8px);
    z-index: 20;
    pointer-events: none;
  }
  #mobileUI span { white-space: nowrap; }
  #mobileUI .v { color: #0cf; }
  #mobileUI .v.lines { color: #fc0; }
  #mobileUI .v.level { color: #0f8; }
</style>
</head>
<body>

<a id="menuLink" href="index.html">← volver</a>

<div id="wrapper">
  <canvas id="board" width="300" height="600"></canvas>
  <div id="sidebar">
    <div class="panel">
      <h3>puntaje</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <h3>líneas</h3>
      <div class="value lines" id="lines">0</div>
    </div>
    <div class="panel">
      <h3>nivel</h3>
      <div class="value level" id="level">1</div>
    </div>
    <div class="panel">
      <h3>siguiente</h3>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
    <div class="panel" id="controls">
      <span>← →</span> mover &nbsp; <span>↑</span> rotar &nbsp; <span>↓</span> bajar<br>
      <span>espacio</span> soltar &nbsp; <span>P</span> pausa
    </div>
    <div id="gameover">
      <h1>GAME OVER</h1>
      <p id="goMsg">se acabó</p>
      <button id="restart">🔄 jugar de nuevo</button>
    </div>
  </div>
</div>

<div id="mobileUI">
  <span>🏆 <span class="v" id="mScore">0</span></span>
  <span>📄 <span class="v lines" id="mLines">0</span></span>
  <span>📊 <span class="v level" id="mLevel">1</span></span>
</div>

<div id="touchControls">
  <div class="row"><button id="tbRotate" style="width:70px">↻</button><button id="tbDrop" class="wide">⤓ soltar</button></div>
  <div class="row"><button id="tbLeft">←</button><button id="tbDown">↓</button><button id="tbRight">→</button></div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const board = document.getElementById('board');
const ctx = board.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');

const colors = {
  I: '#0cf', O: '#fc0', T: '#c0f', S: '#0f8',
  Z: '#f44', J: '#48f', L: '#f80',
};
const darkColors = {
  I: '#099', O: '#990', T: '#909', S: '#090',
  Z: '#922', J: '#226', L: '#960',
};

const shapes = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]],
};
const pieces = Object.keys(shapes);

let grid, current, next, score, lines, level, gameOver, paused, dropInterval, dropTimer, animId;
let particles = [], stars = [], flashAlpha = 0;

function initStars() {
  stars = Array.from({length: 40}, () => ({x: Math.random() * 300, y: Math.random() * 600, r: Math.random() * 1.2 + 0.3, s: Math.random() * 0.2 + 0.05}));
}

function addParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * 2 * Math.PI, sp = Math.random() * 3 + 1;
    particles.push({x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 1, r: Math.random() * 3 + 1, color});
  }
}

// --- Audio ---
let actx;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'square', vol = 0.08) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, actx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
  osc.connect(gain);
  gain.connect(actx.destination);
  osc.start(actx.currentTime);
  osc.stop(actx.currentTime + duration);
}

function playNote(freq, start, dur, type = 'square', vol = 0.07) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, start);
  gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
  osc.connect(gain);
  gain.connect(actx.destination);
  osc.start(start);
  osc.stop(start + dur);
}

function sfxMove() { playTone(440, 0.06, 'square', 0.04); }
function sfxRotate() { playTone(660, 0.08, 'square', 0.05); }
function sfxDrop() { playTone(150, 0.12, 'triangle', 0.1); }
function sfxLock() { playTone(200, 0.08, 'triangle', 0.06); }

function sfxClear() {
  if (!actx) return;
  const t = actx.currentTime;
  playNote(523, t, 0.1, 'square', 0.07);
  playNote(659, t + 0.08, 0.1, 'square', 0.07);
  playNote(784, t + 0.16, 0.1, 'square', 0.07);
  playNote(1047, t + 0.24, 0.15, 'square', 0.07);
}

function sfxGameOver() {
  if (!actx) return;
  const t = actx.currentTime;
  [523, 466, 392, 349, 294, 262, 196, 131].forEach((f, i) => {
    playNote(f, t + i * 0.12, 0.18, 'sawtooth', 0.05);
  });
}



function initGrid() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randomPiece() {
  const type = pieces[Math.floor(Math.random() * pieces.length)];
  const shape = shapes[type].map(r => [...r]);
  return { type, shape, x: Math.floor((COLS - shape[0].length) / 2), y: 0 };
}

function spawn() {
  if (!next) next = randomPiece();
  current = next;
  current.x = Math.floor((COLS - current.shape[0].length) / 2);
  current.y = 0;
  next = randomPiece();
  if (collides(current.shape, current.x, current.y)) {
    gameOver = true;
    sfxGameOver();
    const tb = Math.max(score, parseInt(localStorage.getItem('tetrisBest') || '0', 10));
    localStorage.setItem('tetrisBest', tb.toString());
    const gm = document.getElementById('goMsg'); if (gm) gm.textContent = `${score} pts · récord ${tb}`;
    document.getElementById('gameover').style.display = 'block';
    document.getElementById('restart').style.display = 'block';
  }
  drawNext();
}

function collides(shape, ox, oy) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[0].length; c++)
      if (shape[r][c] && (ox + c < 0 || ox + c >= COLS || oy + r >= ROWS || grid[oy + r]?.[ox + c]))
        return true;
  return false;
}

function lock() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[0].length; c++)
      if (current.shape[r][c])
        grid[current.y + r][current.x + c] = current.type;
  sfxLock();
  addParticles(current.x * 30 + 15, current.y * 30 + 15, colors[current.type], 6);
  clearLines();
  spawn();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c !== 0)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    sfxClear();
    for (let c = 0; c < COLS; c++) addParticles(c * 30 + 15, 300, '#fff', 3);
    const pts = [0, 100, 300, 500, 800][cleared];
    score += pts * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 800 - (level - 1) * 60);
    updateUI();
  }
}

function move(dx) {
  if (!current || gameOver || paused) return;
  if (!collides(current.shape, current.x + dx, current.y)) {
    current.x += dx;
    sfxMove();
  }
}

function rotate() {
  if (!current || gameOver || paused) return;
  const shape = current.shape[0].map((_, i) => current.shape.map(r => r[i]).reverse());
  let ox = current.x, oy = current.y;
  if (!collides(shape, ox, oy)) { current.shape = shape; sfxRotate(); return; }
  if (!collides(shape, ox - 1, oy)) { current.shape = shape; current.x--; sfxRotate(); return; }
  if (!collides(shape, ox + 1, oy)) { current.shape = shape; current.x++; sfxRotate(); return; }
  if (!collides(shape, ox, oy - 1)) { current.shape = shape; current.y--; sfxRotate(); return; }
}

function hardDrop() {
  if (!current || gameOver || paused) return;
  while (!collides(current.shape, current.x, current.y + 1)) current.y++;
  sfxDrop();
  lock();
}

function softDrop() {
  if (!current || gameOver || paused) return;
  if (!collides(current.shape, current.x, current.y + 1)) {
    current.y++;
    return true;
  }
  lock();
  return false;
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lines').textContent = lines;
  document.getElementById('level').textContent = level;
}

function drawBlock(context, x, y, type, dark = false) {
  if (!type) return;
  context.fillStyle = dark ? darkColors[type] : colors[type];
  context.fillRect(x, y, BLOCK, BLOCK);
  context.fillStyle = 'rgba(255,255,255,0.1)';
  context.fillRect(x + 2, y + 2, BLOCK - 4, BLOCK - 4);
  context.fillStyle = 'rgba(0,0,0,0.15)';
  context.fillRect(x + 4, y + 4, BLOCK - 8, BLOCK - 8);
}

function draw() {
  ctx.fillStyle = '#0f0f1f';
  ctx.fillRect(0, 0, board.width, board.height);

  // stars
  stars.forEach(s => {
    s.y += s.s;
    if (s.y > 600) { s.y = 0; s.x = Math.random() * 300; }
    ctx.fillStyle = `rgba(255,255,255,${0.15 + Math.sin(s.y * 0.01) * 0.1})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 0.025;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // flash
  flashAlpha = 0;

  // grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let r = 1; r < ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(board.width, r * BLOCK); ctx.stroke();
  }
  for (let c = 1; c < COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, board.height); ctx.stroke();
  }

  // locked blocks
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c])
        drawBlock(ctx, c * BLOCK, r * BLOCK, grid[r][c]);

  if (current && !gameOver) {
    // ghost
    let gy = current.y;
    while (!collides(current.shape, current.x, gy + 1)) gy++;
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[0].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, (current.x + c) * BLOCK, (gy + r) * BLOCK, current.type, true);

    // current piece
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[0].length; c++)
        if (current.shape[r][c])
          drawBlock(ctx, (current.x + c) * BLOCK, (current.y + r) * BLOCK, current.type);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, board.width, board.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 42px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 150, 280);
    ctx.font = '18px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(score + ' pts', 150, 330);
  }

  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, board.width, board.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 42px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSA', 150, 285);
  }
}

function drawNext() {
  nctx.fillStyle = '#0f0f1f';
  nctx.fillRect(0, 0, 120, 120);
  if (!next) return;
  const s = next.shape;
  const bs = 24;
  const ox = (120 - s[0].length * bs) / 2;
  const oy = (120 - s.length * bs) / 2;
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[0].length; c++)
      if (s[r][c]) {
        const color = colors[next.type];
        nctx.fillStyle = color;
        nctx.fillRect(ox + c * bs, oy + r * bs, bs, bs);
        nctx.fillStyle = 'rgba(255,255,255,0.12)';
        nctx.fillRect(ox + c * bs + 2, oy + r * bs + 2, bs - 4, bs - 4);
      }
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
}

function update(timestamp) {
  if (!gameOver && !paused) {
    if (timestamp - dropTimer > dropInterval) {
      softDrop();
      dropTimer = timestamp;
    }
  }
  draw();
  animId = requestAnimationFrame(update);
}

function startGame() {
  if (animId) cancelAnimationFrame(animId);
  initAudio();
  initGrid();
  initStars();
  particles = [];
  flashAlpha = 0;
  score = 0; lines = 0; level = 1; gameOver = false; paused = false;
  dropInterval = 800;
  next = null;
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('restart').style.display = 'none';
  updateUI();
  spawn();
  dropTimer = performance.now();
  animId = requestAnimationFrame(update);
}

document.addEventListener('keydown', e => {
  initAudio();
  if (gameOver && e.key !== 'r') return;
  if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
  if (paused) return;
  switch (e.key) {
    case 'ArrowLeft': move(-1); break;
    case 'ArrowRight': move(1); break;
    case 'ArrowDown': softDrop(); break;
    case 'ArrowUp': rotate(); break;
    case ' ': e.preventDefault(); hardDrop(); break;
  }
});

document.addEventListener('click', initAudio, { once: true });
document.getElementById('restart').addEventListener('click', startGame);

// Touch controls
function setupBtn(id, action) {
  const el = document.getElementById(id);
  if (!el) return;
  function go(e) { e.preventDefault(); initAudio(); if (!gameOver && !paused) action(); }
  el.addEventListener('touchstart', go, { passive: false });
  el.addEventListener('mousedown', go);
}
setupBtn('tbLeft', () => move(-1));
setupBtn('tbRight', () => move(1));
setupBtn('tbDown', () => softDrop());
setupBtn('tbRotate', () => rotate());
setupBtn('tbDrop', () => hardDrop());

// Update mobile UI
const _baseUI = updateUI;
updateUI = function() {
  _baseUI();
  const s = document.getElementById('mScore');
  const l = document.getElementById('mLines');
  const lv = document.getElementById('mLevel');
  if (s) s.textContent = score;
  if (l) l.textContent = lines;
  if (lv) lv.textContent = level;
};

startGame();

</script>
</body>
</html>
